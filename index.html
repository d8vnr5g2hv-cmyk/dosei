<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ふたりじゅんび</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1b2a4a;
  --navy-deep:#13203a;
  --navy-soft:#2f4068;
  --accent:#e8b04b;       /* やわらかいゴールド */
  --accent-2:#7fa8d4;     /* 空色アクセント */
  --pink:#e8889b;
  --bg:#f7f8fb;
  --card:#ffffff;
  --ink:#1b2a4a;
  --ink-soft:#5a6b8a;
  --line:#e7ebf2;
  --good:#5cb88a;
  --shadow:0 8px 28px rgba(27,42,74,.10);
  --shadow-sm:0 3px 12px rgba(27,42,74,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
.display{font-family:'Zen Maru Gothic',sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:16px;}

/* ---------- レイアウト ---------- */
#app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:84px;position:relative;}

/* ---------- ヘッダー ---------- */
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-soft) 100%);
  color:#fff;padding:14px 18px 16px;
  border-radius:0 0 24px 24px;
  position:relative;overflow:hidden;
}
.topbar::after{content:"";position:absolute;right:-40px;top:-40px;width:140px;height:140px;
  background:radial-gradient(circle,rgba(232,176,75,.25),transparent 70%);border-radius:50%;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1;}
.app-title{font-size:18px;font-weight:900;letter-spacing:.04em;}
.app-title small{display:block;font-size:10px;opacity:.7;font-weight:500;letter-spacing:.2em;margin-top:1px;}
.whoami{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.13);padding:5px 10px 5px 5px;border-radius:30px;}
.whoami img,.whoami .ava-fallback{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--navy);font-size:14px;}
.whoami span{font-size:12px;font-weight:700;}

.countdown{margin-top:14px;position:relative;z-index:1;display:flex;align-items:baseline;gap:8px;}
.countdown .big{font-size:34px;font-weight:900;font-family:'Zen Maru Gothic';line-height:1;color:var(--accent);}
.countdown .lbl{font-size:12px;opacity:.85;}
.countdown .set-btn{margin-left:auto;font-size:11px;background:rgba(255,255,255,.16);padding:6px 12px;border-radius:20px;font-weight:700;}

/* ---------- タブ本文 ---------- */
.tabwrap{padding:16px 16px 0;}
.section-title{font-family:'Zen Maru Gothic';font-weight:900;font-size:17px;margin:4px 2px 12px;display:flex;align-items:center;gap:8px;}
.section-title .dot{width:8px;height:18px;border-radius:4px;background:var(--accent);display:inline-block;}

.card{background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;}
.card.flat{box-shadow:none;border:1px solid var(--line);}

/* ---------- 下部タブバー ---------- */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index:50;
}
.tabbtn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:3px 0;color:var(--ink-soft);font-size:9.5px;font-weight:700;transition:color .15s;}
.tabbtn .ico{width:24px;height:24px;}
.tabbtn.active{color:var(--navy);}
.tabbtn.active .ico{transform:translateY(-1px);}
.tabbtn.active .ico path,.tabbtn.active .ico circle,.tabbtn.active .ico rect{stroke:var(--navy);}

/* ---------- 汎用パーツ ---------- */
.row{display:flex;align-items:center;gap:10px;}
.btn{background:var(--navy);color:#fff;font-weight:800;padding:11px 16px;border-radius:14px;font-size:14px;transition:transform .1s,opacity .15s;}
.btn:active{transform:scale(.97);}
.btn.ghost{background:var(--bg);color:var(--navy);border:1.5px solid var(--line);}
.btn.gold{background:var(--accent);color:var(--navy);}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:11px;}
.btn.block{width:100%;}
.input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:13px;background:#fbfcfe;transition:border .15s;}
.input:focus{outline:none;border-color:var(--accent-2);}
.field-label{font-size:11px;font-weight:700;color:var(--ink-soft);margin:0 0 5px 3px;}

.pill{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:var(--bg);color:var(--ink-soft);}
.pill.a{background:#e8f0fb;color:#3a6db5;}
.pill.b{background:#fce8ee;color:#c75878;}
.pill.both{background:#fdf3dd;color:#b07d1c;}

.checkitem{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);}
.checkitem:last-child{border-bottom:none;}
.cbox{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cbox.on{background:var(--good);border-color:var(--good);}
.cbox.on svg{display:block;}
.cbox svg{display:none;width:14px;height:14px;}
.ci-main{flex:1;min-width:0;}
.ci-title{font-weight:700;font-size:14px;}
.ci-title.done{text-decoration:line-through;color:var(--ink-soft);opacity:.6;}
.ci-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.ci-meta .mini{font-size:10px;color:var(--ink-soft);}

/* ---------- タスク強化：期限バッジ ---------- */
.due-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
.due-badge.over{background:#fde3e3;color:#c0392b;}      /* 期限切れ */
.due-badge.today{background:#ffeede;color:#d35400;}     /* 今日まで */
.due-badge.soon{background:#fff6dd;color:#b07d1c;}      /* あと数日 */
.due-badge.far{background:#e9f3ec;color:#3f8f63;}       /* 余裕あり */
.due-badge.done{background:var(--bg);color:var(--ink-soft);}

/* ---------- タスク強化：カテゴリ見出し ---------- */
.cat-head{display:flex;align-items:center;gap:8px;font-family:'Zen Maru Gothic';font-weight:800;font-size:14px;margin:14px 2px 8px;}
.cat-chip{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.cat-count{font-size:10px;font-weight:700;color:var(--ink-soft);margin-left:auto;background:var(--bg);padding:2px 9px;border-radius:20px;}
.card.taskcard{border-left:4px solid var(--line);padding:6px 16px;}

/* ---------- タスク強化：担当アイコン ---------- */
.assignee-wrap{display:inline-flex;align-items:center;gap:-4px;}
.assignee-wrap .ava-mini{width:20px;height:20px;border:2px solid #fff;margin-left:-6px;box-shadow:var(--shadow-sm);}
.assignee-wrap .ava-mini:first-child{margin-left:0;}
.assignee-none{font-size:10px;color:var(--ink-soft);background:var(--bg);padding:3px 8px;border-radius:20px;font-weight:700;}
.del{color:#c9ccd6;font-size:18px;padding:4px 6px;flex-shrink:0;}

.progress{height:10px;background:var(--bg);border-radius:10px;overflow:hidden;}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:10px;transition:width .5s cubic-bezier(.3,1.2,.5,1);}

.empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:24px 10px;opacity:.7;}

.ava-mini{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--accent-2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;}

/* ---------- モーダル ---------- */
.overlay{position:fixed;inset:0;background:rgba(19,32,58,.5);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{background:#fff;width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.3,1);max-height:88vh;overflow-y:auto;}
.overlay.show .sheet{transform:translateY(0);}
.sheet h3{font-family:'Zen Maru Gothic';font-size:17px;margin:0 0 16px;}
.sheet .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.seg{display:flex;gap:6px;background:var(--bg);padding:5px;border-radius:14px;}
.seg button{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:700;color:var(--ink-soft);}
.seg button.on{background:#fff;color:var(--navy);box-shadow:var(--shadow-sm);}

/* ---------- ゲーム / 育成キャラ ---------- */
.pet-card{background:linear-gradient(160deg,#f0f4fb,#e6edf8);border-radius:20px;padding:18px;text-align:center;position:relative;overflow:hidden;}
/* ===== 部屋の背景（CSSで描画） ===== */
/* 部屋＝左右2分割。各自が自分の半分の背景・飾りを設定 */
.room{position:relative;border-radius:18px;overflow:hidden;margin-top:10px;min-height:230px;display:flex;box-shadow:inset 0 2px 10px rgba(27,42,74,.08);}
.room-half{position:relative;flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:0 6px 0;}
.room-half + .room-half{border-left:1px solid rgba(255,255,255,.45);}
/* 背景バリエーション（上=壁 / 下=床）。壁と床に陰影を足してリッチに */
.room-half[data-bg="room0"]{background:linear-gradient(180deg,#e4ebf6 0 58%,#e9d6bf 58%);}
.room-half[data-bg="white"]{background:linear-gradient(180deg,#eef1f6 0 58%,#e3e6ec 58%);}
.room-half[data-bg="mori"]{background:linear-gradient(180deg,#d3e8d3 0 58%,#abceA3 58%);}
.room-half[data-bg="sunset"]{background:linear-gradient(180deg,#ffd9a6 0 54%,#ec9a70 54%);}
.room-half[data-bg="sea"]{background:linear-gradient(180deg,#c5ecf3 0 58%,#84ccd8 58%);}
.room-half[data-bg="cafe"]{background:linear-gradient(180deg,#e7d6c0 0 58%,#bf9d7b 58%);}
.room-half[data-bg="night"]{background:linear-gradient(180deg,#26365e 0 58%,#3d4c72 58%);}
.room-half[data-bg="sakura"]{background:linear-gradient(180deg,#ffe2ec 0 58%,#f1c7d6 58%);}
.room-half[data-bg="rainbow"]{background:linear-gradient(180deg,#ffd1dc,#ffe7b0,#c8f0c8,#bfe0f5 58%,#d8c4ec 58%);}
.room-half[data-bg="snow"]{background:linear-gradient(180deg,#eef6fc 0 58%,#d3e5f0 58%);}
.room-half[data-bg="space"]{background:linear-gradient(180deg,#1f1740 0 58%,#322a55 58%);}
/* 壁の柔らかい光だまり＋巾木（壁と床の境目の線） */
.room-half::before{content:"";position:absolute;left:0;right:0;top:54%;height:4px;z-index:1;
  background:linear-gradient(180deg,rgba(0,0,0,.10),rgba(255,255,255,.35));}
.room-half::after{content:"";position:absolute;left:-20%;top:-10%;width:80%;height:55%;z-index:0;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.5),transparent 70%);pointer-events:none;}
/* 床ラグ：楕円＋ふち取りで“敷物”感 */
.room-rug{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:80%;height:30px;border-radius:50%;z-index:1;
  background:radial-gradient(ellipse,rgba(232,176,75,.32),rgba(232,176,75,.14) 60%,transparent 72%);
  box-shadow:0 0 0 0 transparent;}
.room-rug::after{content:"";position:absolute;inset:18% 14%;border-radius:50%;border:2px dotted rgba(232,176,75,.4);}
/* 飾り（半分の隅に表示） */
.room-deco-slot{position:absolute;bottom:8px;left:6px;width:46px;height:60px;z-index:2;pointer-events:none;filter:drop-shadow(0 3px 4px rgba(27,42,74,.18));}
.room-deco-slot svg{width:100%;height:100%;display:block;}
.room-half-stage{position:relative;z-index:3;padding-top:96px;padding-bottom:14px;width:100%;display:flex;justify-content:center;}
.room-owner{position:absolute;top:8px;right:8px;z-index:4;font-size:9px;font-weight:800;color:rgba(27,42,74,.55);background:rgba(255,255,255,.6);padding:2px 7px;border-radius:10px;}
.room-half[data-bg="night"] .room-owner,.room-half[data-bg="space"] .room-owner{color:#fff;background:rgba(255,255,255,.22);}
.room-edit{position:absolute;bottom:6px;right:6px;z-index:5;font-size:9px;font-weight:800;color:var(--navy);background:rgba(255,255,255,.85);border:1px solid var(--line);padding:3px 8px;border-radius:12px;cursor:pointer;}
.pet-tap{cursor:pointer;}
.pet-tap .pet-art{transition:transform .15s;}
.pet-tap:active .pet-art{transform:scale(.92);}
.tap-hint{font-size:9px;color:var(--ink-soft);opacity:.7;margin-top:2px;}

/* ===== 喜び演出（撫で=ハート / おやつ=跳ねる） ===== */
.joy-stage{position:fixed;inset:0;z-index:415;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.92),rgba(231,238,250,.95));opacity:0;pointer-events:none;transition:opacity .2s;}
.joy-stage.show{opacity:1;pointer-events:auto;}
.joy-hero{width:170px;height:170px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;}
.joy-hero img,.joy-hero svg{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 10px 16px rgba(27,42,74,.2));}
.joy-hero.jump{animation:joyJump .55s cubic-bezier(.3,1.5,.5,1) infinite;}
@keyframes joyJump{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-26px) scale(1.05,.95)}}
.joy-hero.wiggle{animation:joyWiggle .4s ease-in-out infinite;}
@keyframes joyWiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.joy-msg{margin-top:14px;font-family:'Zen Maru Gothic';font-weight:900;font-size:17px;color:var(--navy);z-index:2;animation:msgIn .35s both;}
.joy-heart{position:absolute;z-index:3;pointer-events:none;animation:joyFloat 1.3s ease-out forwards;}
@keyframes joyFloat{0%{transform:translateY(0) scale(.3);opacity:0}20%{opacity:1}100%{transform:translateY(-120px) scale(1);opacity:0}}

/* ミニゲームCTA */
.game-cta{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#7fa8d4,#9fc0e0);color:#fff;
  border-radius:18px;padding:14px 16px;margin-bottom:14px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s;}
.game-cta:active{transform:scale(.98);}
.game-cta-ic{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* お世話メニュー（シート内） */
.care-menu{display:flex;gap:10px;}
.care-menu .care-btn{flex:1;padding:14px 6px 11px;}
.care-menu .care-ico .ico{width:28px;height:28px;}
/* ミニゲーム */
.game-overlay{position:fixed;inset:0;z-index:410;background:linear-gradient(180deg,#cfe0f2,#eaf1f9);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s;}
.game-overlay.show{opacity:1;pointer-events:auto;}
.game-top{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;}
.game-top .gscore{font-family:'Zen Maru Gothic';font-weight:900;font-size:22px;color:var(--navy);}
.game-top .ghi{font-size:11px;color:var(--ink-soft);font-weight:700;}
.game-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;color:var(--navy);font-size:20px;}
.game-field{flex:1;position:relative;overflow:hidden;}
.game-basket{position:absolute;bottom:18px;width:64px;height:46px;transition:left .05s linear;z-index:3;}
.falling{position:absolute;width:34px;height:34px;z-index:2;}
.game-lives{display:flex;gap:4px;}
.game-life{width:14px;height:14px;color:var(--pink);}
.game-start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:30px;z-index:5;}
.game-start h2{font-family:'Zen Maru Gothic';font-size:24px;margin:0;color:var(--navy);}
.game-start p{color:var(--ink-soft);font-size:13px;margin:0;line-height:1.7;}
.pet-stage{display:flex;justify-content:space-around;align-items:flex-end;gap:8px;margin-top:6px;}
.pet-slot{flex:1;}
.pet-art{width:96px;height:96px;margin:0 auto;filter:drop-shadow(0 6px 10px rgba(27,42,74,.15));animation:bob 3s ease-in-out infinite;}
.pet-slot.partner .pet-art{animation-delay:1.5s;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.pet-name{font-weight:800;font-size:13px;margin-top:6px;}
.pet-lv{font-size:11px;color:var(--ink-soft);font-weight:700;}
.pet-exp{height:7px;background:rgba(27,42,74,.1);border-radius:8px;overflow:hidden;margin-top:6px;}
.pet-exp>i{display:block;height:100%;background:var(--accent);border-radius:8px;transition:width .5s;}
/* お世話ボタン */
.care-row{display:flex;gap:7px;margin-top:12px;justify-content:center;}
.care-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:#fff;border-radius:14px;padding:9px 4px 7px;flex:1;box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .12s;border:1.5px solid transparent;}
.care-btn:active{transform:scale(.93);}
.care-ico{position:relative;display:inline-flex;}
.care-ico .ico{width:22px;height:22px;color:var(--navy);}
.care-chk{position:absolute;right:-7px;bottom:-5px;background:var(--good);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.care-chk .ico{width:9px;height:9px;color:#fff;stroke-width:3;}
.care-btn .care-lb{font-size:10px;font-weight:800;color:var(--navy);}
.care-btn.done{background:var(--bg);box-shadow:none;border-color:var(--line);}
.care-btn.done .care-ico .ico{color:var(--ink-soft);}
.care-btn.done .care-lb{color:var(--good);}
.stage-badge{display:inline-block;font-size:9px;font-weight:800;background:var(--navy);color:#fff;padding:2px 8px;border-radius:20px;margin-top:5px;}

/* キャラ選択 */
.choose-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.choose-card{border:2px solid var(--line);border-radius:16px;padding:12px 6px;text-align:center;transition:all .15s;background:#fff;}
.choose-card.sel{border-color:var(--accent);background:#fffaf0;transform:translateY(-2px);box-shadow:var(--shadow-sm);}
.choose-card svg{width:60px;height:60px;}
.choose-card .cn{font-size:11px;font-weight:800;margin-top:4px;}

/* 起動 / 名前選択 */
.gate{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,var(--navy),var(--navy-deep));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}
.gate h1{font-family:'Zen Maru Gothic';font-size:26px;margin:0 0 4px;}
.gate p{opacity:.7;font-size:13px;margin:0 0 28px;}
.gate .pick{display:flex;gap:14px;width:100%;max-width:340px;}
.gate .pick button{flex:1;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:18px;padding:22px 10px;color:#fff;font-weight:800;font-size:15px;transition:all .15s;}
.gate .pick button:active{transform:scale(.96);background:rgba(232,176,75,.25);}
.gate .ava-big{width:54px;height:54px;border-radius:50%;margin:0 auto 8px;background:var(--accent);object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--navy);}

/* ===== お世話フル演出アニメ ===== */
.care-stage{position:fixed;inset:0;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.96),rgba(231,238,250,.97));
  opacity:0;pointer-events:none;transition:opacity .25s;}
.care-stage.show{opacity:1;pointer-events:auto;}
.care-stage .halo{position:absolute;top:50%;left:50%;width:300px;height:300px;margin:-150px 0 0 -150px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,176,75,.28),transparent 65%);animation:haloPulse 1.4s ease-in-out infinite;}
@keyframes haloPulse{0%,100%{transform:scale(.9);opacity:.6}50%{transform:scale(1.15);opacity:1}}
.care-hero{width:200px;height:200px;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;}
.care-hero img,.care-hero svg{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 10px 18px rgba(27,42,74,.2));}
.care-hero.fed{animation:mogu .5s ease-in-out infinite;}
@keyframes mogu{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(6px) scale(1.04,.96)}}
.care-hero.bath{animation:zabun .7s ease-in-out infinite;}
@keyframes zabun{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.care-hero.play{animation:pyon .6s cubic-bezier(.3,1.4,.5,1) infinite;}
@keyframes pyon{0%,100%{transform:translateY(0) rotate(-6deg)}40%{transform:translateY(-22px) rotate(6deg)}}
.care-msg{margin-top:18px;font-family:'Zen Maru Gothic';font-weight:900;font-size:18px;color:var(--navy);z-index:2;
  animation:msgIn .4s .2s both cubic-bezier(.2,1.4,.4,1);}
.care-exp{margin-top:6px;font-size:13px;font-weight:800;color:var(--accent);z-index:2;opacity:0;animation:msgIn .4s 1.6s both;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.care-item{position:absolute;top:50%;left:50%;width:34px;height:34px;z-index:3;pointer-events:none;
  animation:fly 1.5s ease-out forwards;}

/* ===== ログインボーナス演出 ===== */
.loginbonus{position:fixed;top:0;left:50%;transform:translate(-50%,-120%);z-index:420;
  background:linear-gradient(135deg,var(--accent),#f0c468);color:var(--navy);
  padding:14px 24px;border-radius:0 0 22px 22px;box-shadow:0 10px 30px rgba(232,176,75,.45);
  display:flex;align-items:center;gap:12px;transition:transform .5s cubic-bezier(.2,1.3,.4,1);
  min-width:240px;justify-content:center;}
.loginbonus.show{transform:translate(-50%,0);}
.loginbonus .lb-ico{display:flex;animation:lbSpin 1.2s ease;}
@keyframes lbSpin{0%{transform:rotate(-30deg) scale(.4);opacity:0}60%{transform:rotate(10deg) scale(1.15)}100%{transform:rotate(0) scale(1)}}
.loginbonus .lb-t{font-family:'Zen Maru Gothic';font-weight:900;font-size:14px;line-height:1.3;}
.loginbonus .lb-t small{display:block;font-size:11px;font-weight:700;opacity:.8;}
@keyframes fly{
  0%{transform:translate(-50%,-50%) scale(.2) rotate(0);opacity:0}
  15%{opacity:1}
  100%{transform:translate(var(--fx),var(--fy)) scale(1) rotate(var(--fr));opacity:0}
}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:30px;font-weight:700;font-size:13px;box-shadow:var(--shadow);z-index:300;opacity:0;pointer-events:none;transition:all .3s;display:flex;align-items:center;gap:8px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.fab{position:fixed;bottom:96px;right:calc(50% - 280px + 16px);width:56px;height:56px;border-radius:18px;background:var(--accent);color:var(--navy);font-size:30px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(232,176,75,.45);z-index:40;transition:transform .12s;}
.fab:active{transform:scale(.92);}
@media(max-width:560px){.fab{right:16px;}}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow-sm);}
.stat .num{font-family:'Zen Maru Gothic';font-size:24px;font-weight:900;color:var(--navy);line-height:1;}
.stat .cap{font-size:10px;color:var(--ink-soft);font-weight:700;margin-top:4px;}
.stat .num small{font-size:13px;}

.banner{background:linear-gradient(135deg,var(--accent),#f0c468);border-radius:18px;padding:14px 16px;color:var(--navy);display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.banner .em{font-size:26px;}
.banner b{font-size:15px;font-family:'Zen Maru Gothic';}
.banner div{font-size:11px;opacity:.8;}

.daily{background:#fff;border:1.5px dashed var(--accent);border-radius:16px;padding:14px;margin-bottom:14px;}
.daily-item{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;font-weight:700;}
.daily-item .chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;}
.daily-item.done .chk{background:var(--good);border-color:var(--good);}
.daily-item.done .chk svg{display:block;}
.daily-item .chk svg{display:none;width:11px;height:11px;}
.daily-item.done span{color:var(--ink-soft);text-decoration:line-through;}

.anniv-item{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--line);}
.anniv-item:last-child{border-bottom:none;}
.anniv-d{font-family:'Zen Maru Gothic';font-weight:900;font-size:18px;color:var(--accent);}
.anniv-d small{font-size:11px;color:var(--ink-soft);font-weight:600;}

.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.offline .sync-dot{background:#d76b6b;animation:none;}

.cfg-warn{background:#fff4e5;border:1px solid #f0c468;border-radius:14px;padding:12px 14px;font-size:12px;color:#8a5a00;margin:16px;line-height:1.6;}

/* ---------- ガチャ演出 ---------- */
.gacha-stage{width:200px;height:200px;margin:10px auto 6px;display:flex;align-items:center;justify-content:center;position:relative;border-radius:50%;transition:box-shadow .3s;}
.gacha-stage.flash{box-shadow:0 0 60px 10px rgba(127,168,212,.6);}
.gacha-stage.flash5{box-shadow:0 0 80px 20px rgba(232,176,75,.8);animation:rainbowGlow 1.2s ease;}
@keyframes rainbowGlow{0%{box-shadow:0 0 40px 10px rgba(232,176,75,.6)}50%{box-shadow:0 0 100px 30px rgba(232,136,155,.9)}100%{box-shadow:0 0 80px 20px rgba(127,168,212,.8)}}
.gacha-orb{font-size:80px;line-height:1;transition:transform .3s;}
.gacha-orb.shake{animation:shake .15s linear infinite;}
@keyframes shake{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(-4px,2px) rotate(-6deg)}75%{transform:translate(4px,-2px) rotate(6deg)}}
.gacha-orb.pop{animation:pop .5s cubic-bezier(.2,1.5,.4,1);}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(0)}}
.gacha-orb.reveal{animation:reveal .5s cubic-bezier(.2,1.4,.4,1);}
.gacha-orb.reveal.rare5{filter:drop-shadow(0 0 16px rgba(232,176,75,.8));}
@keyframes reveal{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.g-rarity{font-size:20px;font-weight:900;font-family:'Zen Maru Gothic';margin-top:6px;letter-spacing:.05em;}
.g-name{font-size:14px;font-weight:700;color:#fff;margin-top:2px;}
.evolve-art{width:150px;height:150px;margin:8px auto 0;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 20px rgba(232,176,75,.7));animation:reveal .6s cubic-bezier(.2,1.4,.4,1);}

/* ===== コイン残高ピル / ガチャ導線 ===== */
.coin-bar{display:flex;align-items:center;gap:8px;margin-top:10px;}
.coin-pill{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#fbe7b0,#f4d27a);color:#7a5a12;font-weight:900;font-size:13px;padding:6px 12px;border-radius:20px;box-shadow:var(--shadow-sm);}
.coin-pill .coin-ic{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff6d8,#e8b04b);display:flex;align-items:center;justify-content:center;font-size:9px;color:#8a6510;font-weight:900;}
.shop-btns{display:flex;gap:8px;flex:1;}
.shop-btns .btn{flex:1;padding:9px 8px;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:5px;}
.shop-btns .btn .ico{width:15px;height:15px;}
/* ===== ガチャオーバーレイ ===== */
.ig-overlay{position:fixed;inset:0;z-index:430;background:radial-gradient(circle at 50% 38%,#33457a,#1b2a4a 75%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;opacity:0;pointer-events:none;transition:opacity .25s;padding:24px;color:#fff;}
.ig-overlay.show{opacity:1;pointer-events:auto;}
.ig-close{position:absolute;top:16px;right:18px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;}
.ig-bal{position:absolute;top:18px;left:18px;}
.ig-capsule{width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff0c0,#e8b04b 70%,#c98f2e);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(0,0,0,.35);}
.ig-capsule.shake{animation:shake .14s linear infinite;}
.ig-capsule .ico{width:64px;height:64px;color:#fff;}
.ig-result{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;animation:reveal .5s cubic-bezier(.2,1.4,.4,1);}
.ig-art{width:130px;height:130px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 6px 18px rgba(0,0,0,.4));}
.ig-art svg{width:120px;height:120px;}
.ig-art .ig-bgthumb{width:120px;height:90px;border-radius:14px;border:3px solid #fff;position:relative;overflow:hidden;}
.ig-rare{font-size:13px;font-weight:900;letter-spacing:.12em;}
.ig-name{font-family:'Zen Maru Gothic';font-size:22px;font-weight:900;}
.ig-tag{font-size:12px;opacity:.85;}
.ig-dupe{font-size:12px;color:#ffe08a;font-weight:800;}
.ig-pullbtn{background:var(--accent);color:var(--navy);font-weight:900;font-size:16px;padding:14px 30px;border-radius:30px;box-shadow:0 8px 24px rgba(232,176,75,.4);}
.ig-pullbtn:disabled{opacity:.4;}
.ig-cost{font-size:12px;opacity:.8;text-align:center;margin-top:-4px;}
.rstar1{color:#9aa3b2}.rstar2{color:#5cb88a}.rstar3{color:#5b8fd4}.rstar4{color:#e8b04b}
/* ===== コレクション（シート内） ===== */
.col-tabs{display:flex;gap:6px;margin:4px 0 14px;}
.col-tab{flex:1;padding:8px;border-radius:12px;background:var(--bg);font-size:12.5px;font-weight:800;color:var(--ink-soft);text-align:center;cursor:pointer;border:1.5px solid transparent;}
.col-tab.on{background:var(--navy);color:#fff;}
.col-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.col-cell{border:1.5px solid var(--line);border-radius:14px;padding:8px 6px;text-align:center;background:#fff;position:relative;}
.col-cell.locked{opacity:.4;}
.col-cell.equipped{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,176,75,.25);}
.col-thumb{width:100%;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:5px;overflow:hidden;position:relative;}
.col-thumb svg{width:38px;height:38px;}
.col-nm{font-size:11px;font-weight:800;color:var(--navy);line-height:1.25;}
.col-sub{font-size:9.5px;color:var(--ink-soft);margin-top:2px;}
.col-eqbadge{position:absolute;top:5px;right:5px;font-size:8px;font-weight:900;color:var(--navy);background:var(--accent);padding:2px 6px;border-radius:8px;}
.treat-row{display:flex;align-items:center;gap:10px;padding:10px;border:1.5px solid var(--line);border-radius:14px;margin-bottom:8px;}
.treat-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.treat-ic svg{width:22px;height:22px;}
.treat-mid{flex:1;min-width:0;}
.treat-nm{font-size:13px;font-weight:800;color:var(--navy);}
.treat-sub{font-size:10.5px;color:var(--ink-soft);}
.treat-cnt{font-size:12px;font-weight:900;color:var(--accent-2);}

/* ===== 部屋レイアウト調整（ネームプレート方式） ===== */
.room{min-height:236px;}
.room-half{justify-content:flex-end;padding:8px 8px 10px;}
.room-owner{top:7px;left:7px;right:auto;}
.room-edit{top:6px;right:6px;bottom:auto;}
.room-deco-slot{bottom:10px;left:5px;width:40px;height:52px;z-index:1;}
.room-half-stage{padding-top:0;padding-bottom:6px;align-items:flex-end;}
.rp{width:100%;display:flex;flex-direction:column;align-items:center;}
.rp.pet-tap{cursor:pointer;}
.rp.pet-tap:active .rp-art{transform:scale(.93);}
.rp-art{width:78px;height:78px;filter:drop-shadow(0 6px 9px rgba(27,42,74,.2));animation:bob 3s ease-in-out infinite;transition:transform .15s;}
.room-half + .room-half .rp-art{animation-delay:1.5s;}
.rp-plate{margin-top:4px;width:90%;max-width:150px;background:rgba(255,255,255,.9);border-radius:10px;padding:4px 7px 5px;text-align:center;box-shadow:0 2px 7px rgba(27,42,74,.12);}
.rp-name{font-family:'Zen Maru Gothic';font-weight:900;font-size:11px;color:var(--navy);line-height:1.1;}
.rp-sub{font-size:8.5px;color:var(--ink-soft);margin-top:1px;}
.rp-plate .pet-exp{margin-top:3px;height:5px;}
.rp-hint{font-size:8px;color:var(--ink-soft);margin-top:2px;font-weight:700;}
.rp-care{margin-top:4px;font-size:8.5px;font-weight:800;color:var(--accent-2);background:rgba(127,168,212,.14);border:none;border-radius:10px;padding:3px 8px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}

/* ===== ★5背景アニメ / プレビュー ===== */
.room-half[data-bg="galaxy"]{background:radial-gradient(circle at 32% 26%,#3a2a6a,#16102f 72%);}
[data-bg="galaxy"]::after{content:"";position:absolute;inset:0;z-index:0;background-image:
  radial-gradient(1.6px 1.6px at 20% 30%,#fff,transparent),radial-gradient(1.4px 1.4px at 62% 22%,#fff,transparent),
  radial-gradient(1px 1px at 80% 55%,#fff,transparent),radial-gradient(1.6px 1.6px at 40% 70%,#fff,transparent),
  radial-gradient(1px 1px at 72% 78%,#fff,transparent),radial-gradient(1.2px 1.2px at 12% 60%,#fff,transparent);
  animation:twinkle 2.6s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.45}50%{opacity:1}}
.room-half[data-bg="aurora"]{background:linear-gradient(180deg,#142544 0 60%,#1f3350 60%);}
[data-bg="aurora"]::after{content:"";position:absolute;top:0;left:-10%;right:-10%;height:60%;z-index:0;
  background:linear-gradient(120deg,rgba(95,184,138,.55),rgba(127,168,212,.55),rgba(176,125,224,.55));filter:blur(10px);
  animation:aurora 5s ease-in-out infinite;}
@keyframes aurora{0%,100%{transform:translateX(-8%) skewX(-4deg)}50%{transform:translateX(8%) skewX(4deg)}}
.room-half[data-bg="galaxy"] .room-owner,.room-half[data-bg="aurora"] .room-owner{color:#fff;background:rgba(255,255,255,.22);}
.rstar5{color:#e8b04b;text-shadow:0 0 6px rgba(232,176,75,.55);}
.ig-result.r5 .ig-art{filter:drop-shadow(0 0 26px rgba(232,176,75,.95));}
.ig-result.r5 .ig-name{color:#ffe08a;}
/* プレビュー */
.col-preview{margin-bottom:14px;}
.cp-room{height:124px;border-radius:16px;justify-content:flex-start;padding:14px 8px 8px;margin-bottom:8px;overflow:hidden;}
.cp-pet{z-index:3;}
.cp-pet img,.cp-pet svg{width:66px;height:66px;filter:drop-shadow(0 5px 8px rgba(27,42,74,.2));}
.col-cell.sel{border-color:var(--accent-2);box-shadow:0 0 0 2px rgba(127,168,212,.45);}

/* ===== 背景の実物装飾（星・夕日・花びら・波 など） ===== */
[data-bg]::after{pointer-events:none;}
[data-bg="night"]::after{content:"";position:absolute;inset:0;z-index:0;background-repeat:no-repeat;animation:twinkle 3.2s ease-in-out infinite;background-image:
  radial-gradient(circle at 80% 18%,#fdf6d3 6px,transparent 7px),
  radial-gradient(1.6px 1.6px at 16% 15%,#fff,transparent),radial-gradient(1.4px 1.4px at 33% 26%,#fff,transparent),
  radial-gradient(1.3px 1.3px at 50% 13%,#fff,transparent),radial-gradient(1.6px 1.6px at 63% 30%,#fff,transparent),
  radial-gradient(1.3px 1.3px at 10% 36%,#fff,transparent),radial-gradient(1.4px 1.4px at 45% 40%,#fff,transparent),

[data-bg="space"]::after{content:"";position:absolute;inset:0;z-index:0;background-repeat:no-repeat;animation:twinkle 2.8s ease-in-out infinite;background-image:
  radial-gradient(circle at 24% 22%,#c98ae8 8px,#9a6ad0 9px,transparent 10px),
  radial-gradient(1.6px 1.6px at 12% 14%,#fff,transparent),radial-gradient(1.4px 1.4px at 40% 12%,#fff,transparent),
  radial-gradient(1.6px 1.6px at 58% 24%,#fff,transparent),radial-gradient(1.3px 1.3px at 74% 16%,#fff,transparent),
  radial-gradient(1.5px 1.5px at 88% 34%,#fff,transparent),radial-gradient(1.3px 1.3px at 50% 40%,#fff,transparent),
  radial-gradient(1.4px 1.4px at 30% 38%,#fff,transparent),radial-gradient(1.2px 1.2px at 66% 44%,#fff,transparent);}
[data-bg="sunset"]::after{content:"";position:absolute;inset:0;z-index:0;
  background:radial-gradient(circle at 50% 36%,rgba(255,243,190,.97) 13px,rgba(255,196,118,.55) 22px,transparent 42px);}
[data-bg="sakura"]::after{content:"";position:absolute;inset:0;z-index:0;background-repeat:no-repeat;background-image:
  radial-gradient(3px 4px at 18% 16%,#ff9ec4,transparent),radial-gradient(3px 4px at 36% 28%,#ffb4d2,transparent),
  radial-gradient(2.5px 3.5px at 58% 14%,#ff9ec4,transparent),radial-gradient(3px 4px at 74% 26%,#ffb4d2,transparent),
  radial-gradient(2.5px 3.5px at 28% 44%,#ffc2da,transparent),radial-gradient(3px 4px at 66% 40%,#ff9ec4,transparent),
  radial-gradient(2.5px 3.5px at 88% 48%,#ffb4d2,transparent);}
[data-bg="sea"]::after{content:"";position:absolute;inset:0;z-index:0;background-repeat:no-repeat;background-image:
  radial-gradient(circle at 76% 17%,#fff3c0 7px,rgba(255,243,192,.4) 11px,transparent 14px),
  radial-gradient(2px 2px at 28% 72%,rgba(255,255,255,.85),transparent),radial-gradient(2px 2px at 48% 78%,rgba(255,255,255,.8),transparent),
  radial-gradient(2px 2px at 64% 70%,rgba(255,255,255,.8),transparent),radial-gradient(2px 2px at 82% 76%,rgba(255,255,255,.75),transparent);}
[data-bg="mori"]::after{content:"";position:absolute;inset:0;z-index:0;background-repeat:no-repeat;background-image:
  radial-gradient(9px 9px at 20% 14%,rgba(255,255,200,.45),transparent),radial-gradient(7px 7px at 70% 20%,rgba(255,255,200,.4),transparent),
  radial-gradient(6px 6px at 46% 30%,rgba(186,224,166,.5),transparent),radial-gradient(5px 5px at 86% 36%,rgba(255,255,200,.35),transparent);}
[data-bg="snow"]::after{content:"";position:absolute;inset:0;z-index:0;background-repeat:no-repeat;background-image:
  radial-gradient(2.2px 2.2px at 16% 18%,#fff,transparent),radial-gradient(2px 2px at 34% 30%,#fff,transparent),
  radial-gradient(2.4px 2.4px at 52% 16%,#fff,transparent),radial-gradient(2px 2px at 68% 28%,#fff,transparent),
  radial-gradient(2.2px 2.2px at 84% 20%,#fff,transparent),radial-gradient(2px 2px at 24% 46%,#fff,transparent),
  radial-gradient(2.4px 2.4px at 60% 44%,#fff,transparent),radial-gradient(2px 2px at 44% 56%,#fff,transparent);}

/* ===== お世話インタラクティブ（ごはん選択 / おふろ泡こすり） ===== */
.food-pick{display:flex;gap:12px;margin-top:18px;z-index:3;}
.food-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:#fff;border-radius:16px;padding:12px 10px 9px;box-shadow:var(--shadow);transition:transform .12s;}
.food-btn:active{transform:scale(.9);}
.food-btn svg{width:46px;height:46px;}
.food-btn span{font-size:11px;font-weight:800;color:var(--navy);}
.eating-food{position:fixed;top:50%;left:50%;width:46px;height:46px;z-index:4;pointer-events:none;animation:eatFly 1.5s ease-in forwards;}
@keyframes eatFly{0%{transform:translate(-50%,46px) scale(1);opacity:1}55%{transform:translate(-50%,-4px) scale(.6);opacity:1}100%{transform:translate(-50%,-4px) scale(0);opacity:0}}
.bath-foams{position:fixed;top:50%;left:50%;width:200px;height:200px;margin:-100px 0 0 -100px;z-index:3;pointer-events:none;}
.foam{position:absolute;border-radius:50%;background:radial-gradient(circle at 34% 30%,#fff,#d6e6f4);box-shadow:0 1px 4px rgba(27,42,74,.18),inset 0 -3px 6px rgba(127,168,212,.3);}
.foam.pop{animation:foamPop .24s ease-out forwards;}
@keyframes foamPop{to{transform:scale(1.6);opacity:0}}
.sponge{position:fixed;left:50%;top:62%;width:44px;height:34px;border-radius:10px;background:linear-gradient(#ffe08a,#f2c45a);border:3px solid #fff;box-shadow:0 4px 10px rgba(27,42,74,.3);z-index:5;transform:translate(-50%,-50%);pointer-events:none;}
.sponge::after{content:"";position:absolute;inset:5px 5px auto 5px;height:7px;border-radius:4px;background:rgba(255,255,255,.6);}
.bath-prog{margin-top:10px;font-size:13px;color:var(--accent-2);font-weight:800;z-index:3;}
.care-skip{margin-top:16px;font-size:12px;font-weight:800;color:var(--ink-soft);background:rgba(255,255,255,.7);padding:8px 18px;border-radius:18px;z-index:3;}

/* ===== ミニゲーム：タイマー / スコアポップ ===== */
.game-timer{font-family:'Zen Maru Gothic';font-weight:900;font-size:20px;color:var(--navy);min-width:34px;text-align:center;background:rgba(255,255,255,.7);border-radius:12px;padding:2px 8px;}
.game-timer.low{color:#d06a7e;animation:tpulse .5s ease-in-out infinite;}
@keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.score-pop{position:absolute;font-family:'Zen Maru Gothic';font-weight:900;font-size:18px;z-index:6;pointer-events:none;animation:scorePop .7s ease-out forwards;}
@keyframes scorePop{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-34px);opacity:0}}

function stageOf(type,exp){
  const c=curveOf(type); let s=0;
  for(let i=0;i<c.length;i++){ if(exp>=c[i]) s=i; }
  return s;
}
// 次ステージまでの進捗（0〜1）と残りEXP
function evoProgress(type,exp){
  const c=curveOf(type); const s=stageOf(type,exp);
  if(s>=c.length-1) return {ratio:1,remain:0,max:true,stage:s};
  const cur=c[s], next=c[s+1];
  return {ratio:(exp-cur)/(next-cur), remain:next-exp, max:false, stage:s};
}

/* ============ データ読み込み ============ */
async function loadAll(){
  if(ONLINE){
    try{
      const st = await sb.from('app_state').select('data').eq('id',1).single();
      DB.state = (st.data && st.data.data) || {};
      for(const t of TABLES){
        const r = await sb.from(t).select('*').order('created_at',{ascending:true});
        DB[t] = r.data || [];
      }
      lsSave();
    }catch(e){ console.warn('load fallback',e); DB = Object.assign(DB, lsLoad()); ONLINE=false; }
  }else{
    DB = Object.assign(DB, lsLoad());
  }
}

async function saveState(){
  lsSave();
  if(ONLINE){ try{ await sb.from('app_state').update({data:DB.state,updated_at:new Date().toISOString()}).eq('id',1); }catch(e){} }
}
async function addRow(table,obj){
  obj.created_at=new Date().toISOString();
  if(ONLINE){
    try{ const r=await sb.from(table).insert(obj).select().single(); DB[table].push(r.data); lsSave(); return r.data; }
    catch(e){ console.warn(e); }
  }
  obj.id='loc_'+Date.now()+Math.random().toString(36).slice(2,6); DB[table].push(obj); lsSave(); return obj;
}
async function updRow(table,id,patch){
  const row=DB[table].find(x=>String(x.id)===String(id)); if(row)Object.assign(row,patch); lsSave();
  if(ONLINE){ try{ await sb.from(table).update(patch).eq('id',id); }catch(e){} }
}
async function delRow(table,id){
  DB[table]=DB[table].filter(x=>String(x.id)!==String(id)); lsSave();
  if(ONLINE){ try{ await sb.from(table).delete().eq('id',id); }catch(e){} }
}

function subscribeRealtime(){
  if(!ONLINE) return;
  try{
    sb.channel('futari').on('postgres_changes',{event:'*',schema:'public'},async()=>{
      await loadAll(); render();
    }).subscribe();
  }catch(e){}
}

/* ============ 育成キャラ EXP ============ */
async function gainExp(amount,reason){
  if(!ME) return;
  const key = ME==='a'?'petA':'petB';
  const pet = DB.state[key]; if(!pet||!pet.type||EVO[pet.type]==null) return; // ハズレ確定キャラ等は育たない
  const before = stageOf(pet.type, pet.exp||0);
  pet.exp = (pet.exp||0)+amount;
  const after = stageOf(pet.type, pet.exp);
  await saveState();
  if(after>before){ showEvolve(pet, after); await addCoins(50); }
  else if(reason){ toast(`+${amount} EXP（${reason}）`,'⭐'); }
}

  const nm=stageName(pet.type,pet.exp);

    <div style="font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.1em">EVOLVE!</div>
    <div class="evolve-art">${petImgTag(pet.type,stageIdx+1,140)}</div>
    <h3 style="margin:6px 0 2px">${esc(pet.nick||EVO[pet.type].label)} は<br>「${esc(nm)}」に しんかした！</h3>
    <button class="btn block gold" style="margin-top:14px" onclick="closeSheet()">やったね</button>
  </div>`);
}

function updateBathProg(){ const p=$('#bathProg'); if(p) p.textContent = foamsLeft>0?`あわ あと ${foamsLeft}こ`:'ぴかぴか！'; }
function setupScrub(cs, foams){
  _scrubCS=cs; const sponge=$('#sponge');
  const handler=(cx,cy)=>{
    if(sponge){ sponge.style.left=cx+'px'; sponge.style.top=cy+'px'; }
    for(let i=0;i<foams.length;i++){
      const fo=foams[i]; if(!fo._alive) continue;
      const r=fo.getBoundingClientRect();
      const dx=cx-(r.left+r.width/2), dy=cy-(r.top+r.height/2);
      if(dx*dx+dy*dy < 40*40){
        fo._alive=false; fo.classList.add('pop'); setTimeout(()=>fo.remove(),240);
        foamsLeft--; updateBathProg();
        if(foamsLeft<=0){ teardownScrub(); setTimeout(()=>finishCare('bath',_carePet),300); }
      }
    }
  };
  cs._scrub=(e)=>{ const t=e.touches?e.touches[0]:e; handler(t.clientX,t.clientY); if(e.cancelable&&e.type==='touchmove')e.preventDefault(); };
  cs.addEventListener('touchmove',cs._scrub,{passive:false});
  cs.addEventListener('mousemove',cs._scrub);
}
function teardownScrub(){ const cs=_scrubCS; if(cs&&cs._scrub){ cs.removeEventListener('touchmove',cs._scrub); cs.removeEventListener('mousemove',cs._scrub); cs._scrub=null; } _scrubCS=null; }

function startGame(){
  const field=$('#gField');
  const start=$('#gStart'); if(start) start.remove();
  const pet=DB.state[ME==='a'?'petA':'petB'];
  const basketImg = (pet&&pet.type&&!pet.miss) ? petImgTag(pet.type, stageOf(pet.type,pet.exp||0)+1, 64)
                  : (pet&&pet.miss)? missImgTag(pet.miss,64) : petSVG('cat',1,64);
  const W=field.clientWidth, H=field.clientHeight;
  G={W,H,score:0,items:[],bx:W/2-32,speed:2.0,t:0,last:performance.now(),endAt:performance.now()+45000};
  // カゴ（キャラ）
  const basket=document.createElement('div'); basket.className='game-basket'; basket.id='gBasket';
  basket.innerHTML=basketImg; basket.style.left=G.bx+'px';
  field.appendChild(basket);
  // 操作：タッチ/マウスでカゴを指に追従
  const move=(clientX)=>{ const r=field.getBoundingClientRect(); let x=clientX-r.left-32; x=Math.max(0,Math.min(G.W-64,x)); G.bx=x; basket.style.left=x+'px'; };
  field._move=(e)=>{ const x=e.touches?e.touches[0].clientX:e.clientX; move(x); };
  field.addEventListener('touchmove',field._move,{passive:true});
  field.addEventListener('touchstart',field._move,{passive:true});
  field.addEventListener('mousemove',field._move);
  // スポーン
  G.spawn=setInterval(spawnItem, 720);
  spawnItem();
  G.last=performance.now();
  loopGame();
}
function spawnItem(){
  if(!G) return;
  const field=$('#gField'); if(!field) return;
  // 重み付け抽選：骨38% / ポテト28% / トゲ22% / ハンバーガー12%(レア)

  let kind;
  if(r<0.12) kind='burger';
  else if(r<0.34) kind='spike';
  else if(r<0.62) kind='potato';
  else kind='bone';
  const el=document.createElement('div'); el.className='falling';
  el.innerHTML=GAME_SVG[kind];
  const x=Math.random()*(G.W-40);
  el.style.left=x+'px'; el.style.top='-40px';
  field.appendChild(el);
  G.items.push({el,x,y:-40,vy:G.speed+Math.random()*0.6,kind});

function popScore(txt,col){
  const f=$('#gField'); if(!f)return;
  const el=document.createElement('div'); el.className='score-pop'; el.style.color=col; el.textContent=txt;
  el.style.left=(G.bx+18)+'px'; el.style.bottom='72px'; f.appendChild(el);
  setTimeout(()=>el.remove(),700);
}
function loopGame(){
  if(!G) return;
  const now=performance.now(), dt=Math.min(40,now-G.last); G.last=now;
  G.t+=dt; G.speed=2.0+G.t/16000;
  const remain=Math.max(0,Math.ceil((G.endAt-now)/1000));
  const tEl=$('#gTimer'); if(tEl){ tEl.textContent=remain; tEl.classList.toggle('low',remain<=5); }
  if(now>=G.endAt){ endGame(); return; }
  const itemH=40;
  const basketTop=G.H-18-46, bl=G.bx-16, br=G.bx+64+16;   // 横の判定を広めに
  for(let i=G.items.length-1;i>=0;i--){
    const it=G.items[i];
    it.y+=it.vy*(dt/16); it.el.style.top=it.y+'px';
    if(it.y+itemH>=basketTop-10 && it.y+itemH<=basketTop+58){   // 縦の判定も広めに
      const cx=it.x+itemH/2;
      if(cx>=bl && cx<=br){
        if(it.kind==='burger'){ G.score+=10; popScore('+10','#e0934a'); }
        else if(it.kind==='potato'){ G.score+=5; popScore('+5','#d9a82e'); }
        else if(it.kind==='bone'){ G.score+=3; popScore('+3','#a07c4a'); }
        else { G.score=Math.max(0,G.score-3); popScore('−3','#d06a7e'); }
        $('#gScore').textContent=G.score;
        it.el.remove(); G.items.splice(i,1); continue;
      }
    }
    if(it.y>G.H){ it.el.remove(); G.items.splice(i,1); }   // 落としても減点なし
  }
  G.raf=requestAnimationFrame(loopGame);
}

// 排出テーブル：★5(進化5種)を引きやすめに。引き直し前提＆相棒は1匹なので、テンポ優先で約25%。
function rollGacha(){
  const r=Math.random()*100;
  if(r<25){ // ★5 進化キャラ：5種から均等
    const types=Object.keys(EVO);
    const t=types[Math.floor(Math.random()*types.length)];
    return {kind:'evo',type:t,rarity:5};
  }
  // ハズレ：レア度重みづけ（★1多め）
  const pool=[];
  MISS.forEach(m=>{ const w=m.r===1?5:m.r===2?3:m.r===3?2:1; for(let i=0;i<w;i++)pool.push(m); });
  const m=pool[Math.floor(Math.random()*pool.length)];
  return {kind:'miss',missId:m.id,rarity:m.r,name:m.name};
}

/* ---------- やることチェックリスト ---------- */
const CATS=['物件','契約','引越し','住所変更','手続き','その他'];
// カテゴリごとの色・アイコン
const CAT_STYLE={
  '物件':   {icon:'home',    color:'#7fa8d4', bg:'#e8f0fb'},
  '契約':   {icon:'doc',     color:'#b07de0', bg:'#f3e9fb'},
  '引越し': {icon:'truck',   color:'#e8a44b', bg:'#fdf1dd'},
  '住所変更':{icon:'mail', color:'#e8889b', bg:'#fce8ee'},
  '手続き': {icon:'folder',  color:'#5cb88a', bg:'#e9f3ec'},
  'その他': {icon:'pin',     color:'#9aa3b2', bg:'#eef0f4'}
};
function catStyle(c){ return CAT_STYLE[c]||CAT_STYLE['その他']; }

// 期限バッジ（残り日数を色分け）
function dueBadge(t){
  if(!t.due_date) return '';
  const d=daysUntil(t.due_date);
  if(t.done) return `<span class="due-badge done">${icon('calendar',11)} ${t.due_date}</span>`;
  if(d==null) return '';
  let cls,label;
  if(d<0){ cls='over';  label=`${-d}日すぎ`; }
  else if(d===0){ cls='today'; label='今日まで'; }
  else if(d<=3){ cls='soon';  label=`あと${d}日`; }
  else { cls='far'; label=`あと${d}日`; }
  return `<span class="due-badge ${cls}">${icon(cls==='over'?'warn':'calendar',11)} ${label}</span>`;
}

// 担当アイコン（顔写真）。bothは2人並べる
function assigneeIcon(a){
  if(a==='a') return `<span class="assignee-wrap">${avaHTML('a')}</span>`;
  if(a==='b') return `<span class="assignee-wrap">${avaHTML('b')}</span>`;
  if(a==='both') return `<span class="assignee-wrap">${avaHTML('a')}${avaHTML('b')}</span>`;
  return `<span class="assignee-none">担当未定</span>`;
}

// 期限順ソート：完了は下、未完は期限が近い順、期限なしはその後ろ
function sortByDue(arr){
  return arr.slice().sort((a,b)=>{
    if(!!a.done!==!!b.done) return a.done?1:-1;        // 未完を上
    const da=daysUntil(a.due_date), db=daysUntil(b.due_date);
    if(da==null&&db==null) return 0;
    if(da==null) return 1;                              // 期限なしは下
    if(db==null) return -1;
    return da-db;                                       // 近いやつが上
  });
}

function viewTasks(){
  const cats={};
  DB.tasks.forEach(t=>{ const c=t.category||'その他'; (cats[c]=cats[c]||[]).push(t); });
  const order=[...CATS,...Object.keys(cats).filter(c=>!CATS.includes(c))];
  let body='';
  order.forEach(c=>{
    if(!cats[c]) return;
    const st=catStyle(c);
    const list=sortByDue(cats[c]);
    const doneN=list.filter(t=>t.done).length;
    body+=`<div class="cat-head">
      <span class="cat-chip" style="background:${st.bg};color:${st.color}">${icon(st.icon,15)}</span>
      <span style="color:${st.color}">${esc(c)}</span>
      <span class="cat-count">${doneN}/${list.length}</span>
    </div>
    <div class="card taskcard" style="border-left-color:${st.color}">`;
    list.forEach(t=>{
      body+=`<div class="checkitem">
        <button class="cbox ${t.done?'on':''}" onclick="toggleTask('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="M5 12l5 5 9-9"/></svg></button>
        <div class="ci-main">
          <div class="ci-title ${t.done?'done':''}">${esc(t.title)}</div>
          <div class="ci-meta">${assigneeIcon(t.assignee)}${dueBadge(t)}</div>
        </div>
        <button class="del" onclick="delConfirm('tasks','${t.id}','${esc(t.title)}')">×</button>
      </div>`;
    });
    body+='</div>';
  });
  if(!DB.tasks.length) body=`<div class="empty">右下の ＋ から<br>やることを追加しよう</div>`;
  return `<div class="section-title"><span class="dot"></span>やることリスト</div>${body}`;
}

/* ---------- 記念日 ---------- */
function daysSince(dateStr){ if(!dateStr)return null; const d=new Date(dateStr+'T00:00:00'); const n=new Date(today()+'T00:00:00'); return Math.round((n-d)/86400000); }
function viewAnniv(){
  const list=DB.anniversaries.map(a=>{
    if(a.mode==='countup'){ // 経過日数（付き合って○日目）
      const since=daysSince(a.date);
      return {...a,_mode:'up',_val:since};
    }
    // カウントダウン（次回まで）
    let next=a.date;
    if(a.recurring){
      const t=new Date(today()+'T00:00:00'); const src=new Date(a.date+'T00:00:00');
      let cand=new Date(t.getFullYear(),src.getMonth(),src.getDate());
      if(cand<t) cand=new Date(t.getFullYear()+1,src.getMonth(),src.getDate());
      next=cand.toISOString().slice(0,10);
    }
    return {...a,_mode:'down',_next:next,_d:daysUntil(next)};
  }).sort((x,y)=>{
    // カウントアップは上に、その後カウントダウンを近い順
    if(x._mode!==y._mode) return x._mode==='up'?-1:1;
    return x._mode==='up' ? (y._val-x._val) : (x._d-y._d);
  });
  let rows=list.map(a=>{
    const right = a._mode==='up'
      ? `<div class="anniv-d" style="color:var(--pink)">${a._val>=0?a._val:'—'}<small>日目</small></div>`
      : `<div class="anniv-d">${a._d===0?'今日!':'あと'+a._d}<small>${a._d===0?'':'日'}</small></div>`;
    const sub = a._mode==='up' ? `${a.date} から` : `${a.date}${a.recurring?' ・ 毎年':''}`;
    return `<div class="anniv-item">
      <div><div style="font-weight:800;font-size:14px;display:flex;align-items:center;gap:5px">${a._mode==='up'?`<span style="color:var(--pink);flex-shrink:0">${icon('heart',14)}</span>`:''}${esc(a.label)}</div><div class="mini" style="color:var(--ink-soft)">${sub}</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="text-align:right">${right}</div>
        <button class="del" onclick="delConfirm('anniversaries','${a.id}','${esc(a.label)}')">×</button>
      </div></div>`;
  }).join('');
  if(!list.length) rows=`<div class="empty">付き合った日・誕生日など<br>大切な日を登録しよう</div>`;
  // 先頭のカウントアップをヒーロー表示
  const hero=list.find(a=>a._mode==='up'&&a._val>=0);
  const heroCard = hero?`
    <div class="card" style="background:linear-gradient(135deg,#e8889b,#f0a8b8);color:#fff;text-align:center;padding:20px">
      <div style="font-size:12px;font-weight:700;opacity:.9;display:flex;align-items:center;justify-content:center;gap:5px">${icon('heart',15)} ${esc(hero.label)}</div>
      <div style="font-family:'Zen Maru Gothic';font-weight:900;font-size:44px;line-height:1.1;margin-top:4px">${hero._val}<span style="font-size:18px"> 日目</span></div>
      <div style="font-size:11px;opacity:.85;margin-top:2px">${hero.date} から</div>
    </div>`:'';
  return `<div class="section-title"><span class="dot"></span>記念日カウンター</div>${heroCard}<div class="card">${rows}</div>`;
}

/* ---- ガチャプール（おやつ＝treat / 背景＝bg(初期所持除く) / 飾り＝deco） ---- */
function gachaPool(){
  const pool=[];
  TREAT_LIST.forEach(t=>pool.push({...t,kind:'treat'}));
  BG_LIST.filter(b=>!b.init).forEach(b=>pool.push({...b,kind:'bg'}));
  DECO_LIST.forEach(d=>pool.push({...d,kind:'deco'}));
  return pool;
}
const RARE_WEIGHT={1:48,2:30,3:16,4:4,5:2};
function rollItem(){
  const pool=gachaPool();
  // レア度を重みで抽選
  let total=0; const buckets={1:[],2:[],3:[],4:[],5:[]};
  pool.forEach(it=>buckets[it.rare].push(it));
  const weights=[]; [1,2,3,4,5].forEach(r=>{ if(buckets[r].length){ weights.push([r,RARE_WEIGHT[r]]); total+=RARE_WEIGHT[r]; } });
  let x=Math.random()*total, picked=1;
  for(const [r,w] of weights){ if(x<w){ picked=r; break; } x-=w; }
  const arr=buckets[picked];
  return arr[Math.floor(Math.random()*arr.length)];
}

async function doPull(){
  if(pulling) return;
  if(myCoins()<PULL_COST){ toast('コインが足りないよ'); return; }
  pulling=true;
  await addCoins(-0); // noop（型保険）
  // コイン消費
  const k='coins'+U(ME); DB.state[k]=(DB.state[k]||0)-PULL_COST;
  const it=rollItem();
  // 付与処理＋ダブり判定
  let dupe=false, refund=0;

    const tk='treats'+U(ME); const t=DB.state[tk]||{}; t[it.id]=(t[it.id]||0)+1; DB.state[tk]=t;
  }else{
    const ok='own'+U(ME); const own=DB.state[ok]||['room0'];
    if(own.includes(it.id)){ dupe=true; refund=6; DB.state[k]=(DB.state[k]||0)+refund; }
    else { own.push(it.id); DB.state[ok]=own; }
  }
  await saveState();
  // 演出：カプセルを振って → リザルト
  const cap=$('#igCapsule'); if(cap) cap.classList.add('shake');
  const pull=$('#igPull'); if(pull) pull.disabled=true;
  setTimeout(()=>{
    const ov=$('#igOverlay'); if(!ov){ pulling=false; return; }
    let art='';
    if(it.kind==='bg') art=`<div class="ig-bgthumb" data-bg="${it.id}" style="background:${it.grad}"></div>`;
    else if(it.kind==='deco') art=decoSVG(it.id);
    else art=`<svg viewBox="0 0 24 24" fill="${it.col}"><circle cx="12" cy="12" r="9"/></svg>`;
    const kindLabel = it.kind==='bg'?'背景':it.kind==='deco'?'飾り':'おやつ';
    const tag = it.kind==='treat'?`あげると +${treatExp(it)}EXP`:(dupe?`ダブり → +${refund}コイン`:'コレクションに追加！');
    ov.innerHTML=`<button class="ig-close" onclick="closeItemGacha()">×</button>
      <div class="ig-bal">${coinPill(myCoins())}</div>
      <div class="ig-result ${it.rare>=5?'r5':''}">
        <div class="ig-rare rstar${it.rare}">${'★'.repeat(it.rare)} ${kindLabel}${it.rare>=5?' 大当たり！':''}</div>
        <div class="ig-art">${art}</div>
        <div class="ig-name">${esc(it.name)}</div>
        <div class="${dupe?'ig-dupe':'ig-tag'}">${tag}</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="ig-pullbtn" onclick="doPull()" ${myCoins()<PULL_COST?'disabled':''} style="font-size:14px;padding:12px 22px">もう1回（${PULL_COST}）</button>
        <button class="ig-pullbtn" onclick="closeItemGacha()" style="background:rgba(255,255,255,.2);color:#fff;font-size:14px;padding:12px 22px">とじる</button>
      </div>`;
    pulling=false;
  },700);
}

/* ---- コレクション（自分の背景・飾り装備／おやつをあげる） ---- */
let colTab='bg', colPreviewBg=null, colPreviewDeco=null;
function openCollection(){
  if(!ME){ toast('先に「自分」を選んでね'); return; }
  colTab='bg'; colPreviewBg=bgOf(ME); colPreviewDeco=decoOf(ME); renderCollection();
}
function renderCollection(){
  const own=ownedOf(ME);
  const t=treatsOf(ME);
  let body='';
  const preview = (colTab!=='treat') ? colPreview() : '';
  if(colTab==='bg'){
    body=`<div class="col-grid">${BG_LIST.map(b=>{
      const have=b.init||own.includes(b.id), eq=bgOf(ME)===b.id, sel=colPreviewBg===b.id;
      return `<div class="col-cell ${have?'':'locked'} ${eq?'equipped':''} ${sel?'sel':''}" ${have?`onclick="selBg('${b.id}')"`:''}>
        ${eq?'<span class="col-eqbadge">適用中</span>':''}
        <div class="col-thumb" data-bg="${b.id}" style="background:${b.grad}"></div>
        <div class="col-nm">${esc(b.name)}</div>
        <div class="col-sub">${have?rstar(b.rare):'未所持 '+rstar(b.rare)}</div>
      </div>`;
    }).join('')}</div>`;
  }else if(colTab==='deco'){
    body=`<div class="col-grid">
      <div class="col-cell ${decoOf(ME)?'':'equipped'} ${!colPreviewDeco?'sel':''}" onclick="selDeco('')">
        ${!decoOf(ME)?'<span class="col-eqbadge">適用中</span>':''}
        <div class="col-thumb" style="background:var(--bg)"><span style="font-size:10px;color:var(--ink-soft)">なし</span></div>
        <div class="col-nm">飾らない</div></div>
      ${DECO_LIST.map(d=>{
        const have=own.includes(d.id), eq=decoOf(ME)===d.id, sel=colPreviewDeco===d.id;
        return `<div class="col-cell ${have?'':'locked'} ${eq?'equipped':''} ${sel?'sel':''}" ${have?`onclick="selDeco('${d.id}')"`:''}>
          ${eq?'<span class="col-eqbadge">適用中</span>':''}
          <div class="col-thumb">${decoSVG(d.id)}</div>
          <div class="col-nm">${esc(d.name)}</div>
          <div class="col-sub">${have?rstar(d.rare):'未所持 '+rstar(d.rare)}</div>
        </div>`;
      }).join('')}</div>`;
  }else{
    const owned=TREAT_LIST.filter(x=>(t[x.id]||0)>0);
    body = owned.length? owned.map(x=>`<div class="treat-row">
        <div class="treat-ic" style="background:${x.col}22"><svg viewBox="0 0 24 24" fill="${x.col}"><circle cx="12" cy="12" r="9"/></svg></div>
        <div class="treat-mid"><div class="treat-nm">${esc(x.name)} <span class="treat-cnt">×${t[x.id]}</span></div>
          <div class="treat-sub">あげると +${treatExp(x)}EXP ${rstar(x.rare)}</div></div>
        <button class="btn sm gold" onclick="feedTreat('${x.id}')">あげる</button>
      </div>`).join('')
      : `<div class="empty">おやつをまだ持ってないよ<br>ガチャで集めよう</div>`;
  }
  openSheet(`<h3>コレクション</h3>
    <div class="col-tabs">
      <div class="col-tab ${colTab==='bg'?'on':''}" onclick="colTab='bg';renderCollection()">背景</div>
      <div class="col-tab ${colTab==='deco'?'on':''}" onclick="colTab='deco';renderCollection()">飾り</div>
      <div class="col-tab ${colTab==='treat'?'on':''}" onclick="colTab='treat';renderCollection()">おやつ</div>
    </div>
    ${preview}
    ${body}
    <div style="font-size:10.5px;color:var(--ink-soft);text-align:center;margin-top:12px">${colTab==='treat'?'おやつをあげるとEXPがもらえるよ':'タップでプレビュー → 「この部屋にする」で確定'}</div>`);
}
function colPreview(){
  const pet=DB.state[ME==='a'?'petA':'petB'];
  let art='';
  if(pet&&pet.confirmed&&pet.type&&!pet.miss) art=petImgTag(pet.type,stageOf(pet.type,pet.exp||0)+1,66);
  else if(pet&&pet.miss) art=missImgTag(pet.miss,66);
  else art=petSVG('cat',0,60);
  return `<div class="col-preview">
    <div class="cp-room room-half" data-bg="${colPreviewBg||'room0'}">
      <div class="room-rug"></div>
      ${colPreviewDeco?`<div class="room-deco-slot">${decoSVG(colPreviewDeco)}</div>`:''}
      <div class="cp-pet">${art}</div>
    </div>
    <button class="btn block gold" onclick="applyPreview()">この部屋にする</button>
  </div>`;
}
function selBg(id){ colPreviewBg=id; renderCollection(); }
function selDeco(id){ colPreviewDeco=id||null; renderCollection(); }
async function applyPreview(){
  DB.state['bg'+U(ME)]=colPreviewBg||'room0';
  DB.state['deco'+U(ME)]=colPreviewDeco||null;
  await saveState();
  toast('部屋にはんえいしたよ','🖼');
  renderCollection(); render();
}
async function equipBg(id){ DB.state['bg'+U(ME)]=id; await saveState(); toast('背景をかえた','🖼'); renderCollection(); render(); }
async function equipDeco(id){ DB.state['deco'+U(ME)]=id||null; await saveState(); toast(id?'飾りをおいた':'飾りをはずした'); renderCollection(); render(); }
async function feedTreat(id){
  const tk='treats'+U(ME); const t=DB.state[tk]||{};
  if(!t[id]){ toast('そのおやつ、もう無いよ'); return; }
  const meta=TREAT_LIST.find(x=>x.id===id); if(!meta) return;
  t[id]--; if(t[id]<=0) delete t[id]; DB.state[tk]=t;
  await saveState();
  closeSheet();
  const exp=treatExp(meta);
  playJoy('jump', `${meta.name}、おいしいね！`);   // 跳ねて喜ぶ
  setTimeout(async ()=>{ await gainExp(exp, meta.name); render(); },200);
}

/* プロフィール / 自分の切替 */
function openWhoami(){
  const n=names();
  const myName=ME==='a'?n.a:n.b;
  const pet=DB.state[ME==='a'?'petA':'petB'];
  openSheet(`<h3>プロフィール</h3>
    <div style="text-align:center;margin-bottom:16px">
      <div style="position:relative;display:inline-block">
        ${avaHTML(ME,'ava-big')}
      </div>
      <div style="font-weight:800;margin-top:8px">${esc(myName)}</div>
      ${pet&&pet.confirmed?`<div style="font-size:12px;color:var(--ink-soft)">あいぼう：${esc(pet.nick|| (pet.miss?(pet.name||'あいぼう'):EVO[pet.type].label))}${pet.miss?` ${stars(pet.rarity||1)}`:`（${esc(stageName(pet.type,pet.exp||0))}）`}</div>`:''}
    </div>
    <div class="field-label">プロフィール画像</div>
    <input type="file" accept="image/*" id="ava_file" style="margin-bottom:8px;font-size:13px">
    <div style="font-size:11px;color:var(--ink-soft);margin-bottom:16px">タスク完了などに、この画像が表示されるよ</div>
    <div class="field-label">表示名を変更</div>
    <input class="input" id="ava_name" value="${esc(myName)}" style="margin-bottom:18px">
    <button class="btn block" onclick="saveProfile()">保存</button>
    <button class="btn ghost block" style="margin-top:10px" onclick="switchUser()">別の人に切り替え</button>`);
  $('#ava_file').onchange=onAvaFile;
}
let _pendingAva=null;
function onAvaFile(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    // 縮小してbase64保存（容量節約）
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas'); const S=200;
      const scale=Math.min(S/img.width,S/img.height); cv.width=img.width*scale; cv.height=img.height*scale;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      _pendingAva=cv.toDataURL('image/jpeg',0.8);
      toast('画像を読み込んだよ。保存を押してね','🖼️');
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
}
async function saveProfile(){
  const name=$('#ava_name').value.trim();
  if(name){ if(ME==='a')DB.state.nameA=name; else DB.state.nameB=name; }
  if(_pendingAva){ if(ME==='a')DB.state.avaA=_pendingAva; else DB.state.avaB=_pendingAva; _pendingAva=null; }
  await saveState(); closeSheet(); render(); toast('保存したよ');
}
function switchUser(){ ME=null; closeSheet(); showGate(); renderGate(); }
