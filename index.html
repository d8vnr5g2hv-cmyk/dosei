<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ふたりじゅんび</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1b2a4a;
  --navy-deep:#13203a;
  --navy-soft:#2f4068;
  --accent:#e8b04b;       /* やわらかいゴールド */
  --accent-2:#7fa8d4;     /* 空色アクセント */
  --pink:#e8889b;
  --bg:#f7f8fb;
  --card:#ffffff;
  --ink:#1b2a4a;
  --ink-soft:#5a6b8a;
  --line:#e7ebf2;
  --good:#5cb88a;
  --shadow:0 8px 28px rgba(27,42,74,.10);
  --shadow-sm:0 3px 12px rgba(27,42,74,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
.display{font-family:'Zen Maru Gothic',sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:16px;}

/* ---------- レイアウト ---------- */
#app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:84px;position:relative;}

/* ---------- ヘッダー ---------- */
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-soft) 100%);
  color:#fff;padding:14px 18px 16px;
  border-radius:0 0 24px 24px;
  position:relative;overflow:hidden;
}
.topbar::after{content:"";position:absolute;right:-40px;top:-40px;width:140px;height:140px;
  background:radial-gradient(circle,rgba(232,176,75,.25),transparent 70%);border-radius:50%;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1;}
.app-title{font-size:18px;font-weight:900;letter-spacing:.04em;}
.app-title small{display:block;font-size:10px;opacity:.7;font-weight:500;letter-spacing:.2em;margin-top:1px;}
.whoami{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.13);padding:5px 10px 5px 5px;border-radius:30px;}
.whoami img,.whoami .ava-fallback{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--navy);font-size:14px;}
.whoami span{font-size:12px;font-weight:700;}

.countdown{margin-top:14px;position:relative;z-index:1;display:flex;align-items:baseline;gap:8px;}
.countdown .big{font-size:34px;font-weight:900;font-family:'Zen Maru Gothic';line-height:1;color:var(--accent);}
.countdown .lbl{font-size:12px;opacity:.85;}
.countdown .set-btn{margin-left:auto;font-size:11px;background:rgba(255,255,255,.16);padding:6px 12px;border-radius:20px;font-weight:700;}

/* ---------- タブ本文 ---------- */
.tabwrap{padding:16px 16px 0;}
.section-title{font-family:'Zen Maru Gothic';font-weight:900;font-size:17px;margin:4px 2px 12px;display:flex;align-items:center;gap:8px;}
.section-title .dot{width:8px;height:18px;border-radius:4px;background:var(--accent);display:inline-block;}

.card{background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;}
.card.flat{box-shadow:none;border:1px solid var(--line);}

/* ---------- 下部タブバー ---------- */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index:50;
}
.tabbtn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:3px 0;color:var(--ink-soft);font-size:9.5px;font-weight:700;transition:color .15s;}
.tabbtn .ico{width:24px;height:24px;}
.tabbtn.active{color:var(--navy);}
.tabbtn.active .ico{transform:translateY(-1px);}
.tabbtn.active .ico path,.tabbtn.active .ico circle,.tabbtn.active .ico rect{stroke:var(--navy);}

/* ---------- 汎用パーツ ---------- */
.row{display:flex;align-items:center;gap:10px;}
.btn{background:var(--navy);color:#fff;font-weight:800;padding:11px 16px;border-radius:14px;font-size:14px;transition:transform .1s,opacity .15s;}
.btn:active{transform:scale(.97);}
.btn.ghost{background:var(--bg);color:var(--navy);border:1.5px solid var(--line);}
.btn.gold{background:var(--accent);color:var(--navy);}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:11px;}
.btn.block{width:100%;}
.input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:13px;background:#fbfcfe;transition:border .15s;}
.input:focus{outline:none;border-color:var(--accent-2);}
.field-label{font-size:11px;font-weight:700;color:var(--ink-soft);margin:0 0 5px 3px;}

.pill{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:var(--bg);color:var(--ink-soft);}
.pill.a{background:#e8f0fb;color:#3a6db5;}
.pill.b{background:#fce8ee;color:#c75878;}
.pill.both{background:#fdf3dd;color:#b07d1c;}

.checkitem{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);}
.checkitem:last-child{border-bottom:none;}
.cbox{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cbox.on{background:var(--good);border-color:var(--good);}
.cbox.on svg{display:block;}
.cbox svg{display:none;width:14px;height:14px;}
.ci-main{flex:1;min-width:0;}
.ci-title{font-weight:700;font-size:14px;}
.ci-title.done{text-decoration:line-through;color:var(--ink-soft);opacity:.6;}
.ci-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.ci-meta .mini{font-size:10px;color:var(--ink-soft);}

/* ---------- タスク強化：期限バッジ ---------- */
.due-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
.due-badge.over{background:#fde3e3;color:#c0392b;}      /* 期限切れ */
.due-badge.today{background:#ffeede;color:#d35400;}     /* 今日まで */
.due-badge.soon{background:#fff6dd;color:#b07d1c;}      /* あと数日 */
.due-badge.far{background:#e9f3ec;color:#3f8f63;}       /* 余裕あり */
.due-badge.done{background:var(--bg);color:var(--ink-soft);}

/* ---------- タスク強化：カテゴリ見出し ---------- */
.cat-head{display:flex;align-items:center;gap:8px;font-family:'Zen Maru Gothic';font-weight:800;font-size:14px;margin:14px 2px 8px;}
.cat-chip{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.cat-count{font-size:10px;font-weight:700;color:var(--ink-soft);margin-left:auto;background:var(--bg);padding:2px 9px;border-radius:20px;}
.card.taskcard{border-left:4px solid var(--line);padding:6px 16px;}

/* ---------- タスク強化：担当アイコン ---------- */
.assignee-wrap{display:inline-flex;align-items:center;gap:-4px;}
.assignee-wrap .ava-mini{width:20px;height:20px;border:2px solid #fff;margin-left:-6px;box-shadow:var(--shadow-sm);}
.assignee-wrap .ava-mini:first-child{margin-left:0;}
.assignee-none{font-size:10px;color:var(--ink-soft);background:var(--bg);padding:3px 8px;border-radius:20px;font-weight:700;}
.del{color:#c9ccd6;font-size:18px;padding:4px 6px;flex-shrink:0;}

.progress{height:10px;background:var(--bg);border-radius:10px;overflow:hidden;}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:10px;transition:width .5s cubic-bezier(.3,1.2,.5,1);}

.empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:24px 10px;opacity:.7;}

.ava-mini{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--accent-2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;}

/* ---------- モーダル ---------- */
.overlay{position:fixed;inset:0;background:rgba(19,32,58,.5);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{background:#fff;width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.3,1);max-height:88vh;overflow-y:auto;}
.overlay.show .sheet{transform:translateY(0);}
.sheet h3{font-family:'Zen Maru Gothic';font-size:17px;margin:0 0 16px;}
.sheet .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.seg{display:flex;gap:6px;background:var(--bg);padding:5px;border-radius:14px;}
.seg button{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:700;color:var(--ink-soft);}
.seg button.on{background:#fff;color:var(--navy);box-shadow:var(--shadow-sm);}

/* ---------- ゲーム / 育成キャラ ---------- */
.pet-card{background:linear-gradient(160deg,#f0f4fb,#e6edf8);border-radius:20px;padding:18px;text-align:center;position:relative;overflow:hidden;}
/* ===== 部屋の背景（CSSで描画） ===== */
.room{position:relative;border-radius:18px;overflow:hidden;padding:14px 14px 0;margin-top:10px;
  background:
    /* 壁 */
    linear-gradient(180deg,#dfe7f4 0%,#dfe7f4 62%,transparent 62%),
    /* 床 */
    linear-gradient(180deg,#e8d4bd 62%,#dcc4a8 100%);
  min-height:200px;}
.room::before{ /* 窓 */
  content:"";position:absolute;top:18px;left:50%;transform:translateX(-50%);width:96px;height:74px;border-radius:8px;
  background:linear-gradient(160deg,#bfe0f0,#9fc9e8);box-shadow:0 0 0 5px #fff,0 4px 10px rgba(27,42,74,.1);}
.room::after{ /* 窓枠の十字 */
  content:"";position:absolute;top:18px;left:50%;transform:translateX(-50%);width:96px;height:74px;
  background:
    linear-gradient(90deg,transparent 47%,#fff 47%,#fff 53%,transparent 53%),
    linear-gradient(180deg,transparent 47%,#fff 47%,#fff 53%,transparent 53%);}
.room-deco{position:absolute;bottom:0;font-size:0;pointer-events:none;}
.room-plant{left:10px;bottom:8px;width:34px;height:46px;}
.room-rug{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);width:64%;height:26px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(232,176,75,.35),rgba(232,176,75,.12));}
.room-stage{position:relative;z-index:2;display:flex;justify-content:space-around;align-items:flex-end;gap:8px;padding-top:78px;}
.pet-tap{cursor:pointer;}
.pet-tap .pet-art{transition:transform .15s;}
.pet-tap:active .pet-art{transform:scale(.92);}
.tap-hint{font-size:9px;color:var(--ink-soft);opacity:.7;margin-top:2px;}

/* ミニゲームCTA */
.game-cta{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#7fa8d4,#9fc0e0);color:#fff;
  border-radius:18px;padding:14px 16px;margin-bottom:14px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s;}
.game-cta:active{transform:scale(.98);}
.game-cta-ic{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* お世話メニュー（シート内） */
.care-menu{display:flex;gap:10px;}
.care-menu .care-btn{flex:1;padding:14px 6px 11px;}
.care-menu .care-ico .ico{width:28px;height:28px;}
/* ミニゲーム */
.game-overlay{position:fixed;inset:0;z-index:410;background:linear-gradient(180deg,#cfe0f2,#eaf1f9);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s;}
.game-overlay.show{opacity:1;pointer-events:auto;}
.game-top{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;}
.game-top .gscore{font-family:'Zen Maru Gothic';font-weight:900;font-size:22px;color:var(--navy);}
.game-top .ghi{font-size:11px;color:var(--ink-soft);font-weight:700;}
.game-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;color:var(--navy);font-size:20px;}
.game-field{flex:1;position:relative;overflow:hidden;}
.game-basket{position:absolute;bottom:18px;width:64px;height:46px;transition:left .05s linear;z-index:3;}
.falling{position:absolute;width:34px;height:34px;z-index:2;}
.game-lives{display:flex;gap:4px;}
.game-life{width:14px;height:14px;color:var(--pink);}
.game-start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:30px;z-index:5;}
.game-start h2{font-family:'Zen Maru Gothic';font-size:24px;margin:0;color:var(--navy);}
.game-start p{color:var(--ink-soft);font-size:13px;margin:0;line-height:1.7;}
.pet-stage{display:flex;justify-content:space-around;align-items:flex-end;gap:8px;margin-top:6px;}
.pet-slot{flex:1;}
.pet-art{width:96px;height:96px;margin:0 auto;filter:drop-shadow(0 6px 10px rgba(27,42,74,.15));animation:bob 3s ease-in-out infinite;}
.pet-slot.partner .pet-art{animation-delay:1.5s;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.pet-name{font-weight:800;font-size:13px;margin-top:6px;}
.pet-lv{font-size:11px;color:var(--ink-soft);font-weight:700;}
.pet-exp{height:7px;background:rgba(27,42,74,.1);border-radius:8px;overflow:hidden;margin-top:6px;}
.pet-exp>i{display:block;height:100%;background:var(--accent);border-radius:8px;transition:width .5s;}
/* お世話ボタン */
.care-row{display:flex;gap:7px;margin-top:12px;justify-content:center;}
.care-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:#fff;border-radius:14px;padding:9px 4px 7px;flex:1;box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .12s;border:1.5px solid transparent;}
.care-btn:active{transform:scale(.93);}
.care-ico{position:relative;display:inline-flex;}
.care-ico .ico{width:22px;height:22px;color:var(--navy);}
.care-chk{position:absolute;right:-7px;bottom:-5px;background:var(--good);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.care-chk .ico{width:9px;height:9px;color:#fff;stroke-width:3;}
.care-btn .care-lb{font-size:10px;font-weight:800;color:var(--navy);}
.care-btn.done{background:var(--bg);box-shadow:none;border-color:var(--line);}
.care-btn.done .care-ico .ico{color:var(--ink-soft);}
.care-btn.done .care-lb{color:var(--good);}
.stage-badge{display:inline-block;font-size:9px;font-weight:800;background:var(--navy);color:#fff;padding:2px 8px;border-radius:20px;margin-top:5px;}

/* キャラ選択 */
.choose-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.choose-card{border:2px solid var(--line);border-radius:16px;padding:12px 6px;text-align:center;transition:all .15s;background:#fff;}
.choose-card.sel{border-color:var(--accent);background:#fffaf0;transform:translateY(-2px);box-shadow:var(--shadow-sm);}
.choose-card svg{width:60px;height:60px;}
.choose-card .cn{font-size:11px;font-weight:800;margin-top:4px;}

/* 起動 / 名前選択 */
.gate{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,var(--navy),var(--navy-deep));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}
.gate h1{font-family:'Zen Maru Gothic';font-size:26px;margin:0 0 4px;}
.gate p{opacity:.7;font-size:13px;margin:0 0 28px;}
.gate .pick{display:flex;gap:14px;width:100%;max-width:340px;}
.gate .pick button{flex:1;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:18px;padding:22px 10px;color:#fff;font-weight:800;font-size:15px;transition:all .15s;}
.gate .pick button:active{transform:scale(.96);background:rgba(232,176,75,.25);}
.gate .ava-big{width:54px;height:54px;border-radius:50%;margin:0 auto 8px;background:var(--accent);object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--navy);}

/* ===== お世話フル演出アニメ ===== */
.care-stage{position:fixed;inset:0;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.96),rgba(231,238,250,.97));
  opacity:0;pointer-events:none;transition:opacity .25s;}
.care-stage.show{opacity:1;pointer-events:auto;}
.care-stage .halo{position:absolute;top:50%;left:50%;width:300px;height:300px;margin:-150px 0 0 -150px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,176,75,.28),transparent 65%);animation:haloPulse 1.4s ease-in-out infinite;}
@keyframes haloPulse{0%,100%{transform:scale(.9);opacity:.6}50%{transform:scale(1.15);opacity:1}}
.care-hero{width:200px;height:200px;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;}
.care-hero img,.care-hero svg{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 10px 18px rgba(27,42,74,.2));}
.care-hero.fed{animation:mogu .5s ease-in-out infinite;}
@keyframes mogu{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(6px) scale(1.04,.96)}}
.care-hero.bath{animation:zabun .7s ease-in-out infinite;}
@keyframes zabun{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.care-hero.play{animation:pyon .6s cubic-bezier(.3,1.4,.5,1) infinite;}
@keyframes pyon{0%,100%{transform:translateY(0) rotate(-6deg)}40%{transform:translateY(-22px) rotate(6deg)}}
.care-msg{margin-top:18px;font-family:'Zen Maru Gothic';font-weight:900;font-size:18px;color:var(--navy);z-index:2;
  animation:msgIn .4s .2s both cubic-bezier(.2,1.4,.4,1);}
.care-exp{margin-top:6px;font-size:13px;font-weight:800;color:var(--accent);z-index:2;opacity:0;animation:msgIn .4s 1.6s both;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.care-item{position:absolute;top:50%;left:50%;width:34px;height:34px;z-index:3;pointer-events:none;
  animation:fly 1.5s ease-out forwards;}

/* ===== ログインボーナス演出 ===== */
.loginbonus{position:fixed;top:0;left:50%;transform:translate(-50%,-120%);z-index:420;
  background:linear-gradient(135deg,var(--accent),#f0c468);color:var(--navy);
  padding:14px 24px;border-radius:0 0 22px 22px;box-shadow:0 10px 30px rgba(232,176,75,.45);
  display:flex;align-items:center;gap:12px;transition:transform .5s cubic-bezier(.2,1.3,.4,1);
  min-width:240px;justify-content:center;}
.loginbonus.show{transform:translate(-50%,0);}
.loginbonus .lb-ico{display:flex;animation:lbSpin 1.2s ease;}
@keyframes lbSpin{0%{transform:rotate(-30deg) scale(.4);opacity:0}60%{transform:rotate(10deg) scale(1.15)}100%{transform:rotate(0) scale(1)}}
.loginbonus .lb-t{font-family:'Zen Maru Gothic';font-weight:900;font-size:14px;line-height:1.3;}
.loginbonus .lb-t small{display:block;font-size:11px;font-weight:700;opacity:.8;}
@keyframes fly{
  0%{transform:translate(-50%,-50%) scale(.2) rotate(0);opacity:0}
  15%{opacity:1}
  100%{transform:translate(var(--fx),var(--fy)) scale(1) rotate(var(--fr));opacity:0}
}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:30px;font-weight:700;font-size:13px;box-shadow:var(--shadow);z-index:300;opacity:0;pointer-events:none;transition:all .3s;display:flex;align-items:center;gap:8px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.fab{position:fixed;bottom:96px;right:calc(50% - 280px + 16px);width:56px;height:56px;border-radius:18px;background:var(--accent);color:var(--navy);font-size:30px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(232,176,75,.45);z-index:40;transition:transform .12s;}
.fab:active{transform:scale(.92);}
@media(max-width:560px){.fab{right:16px;}}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow-sm);}
.stat .num{font-family:'Zen Maru Gothic';font-size:24px;font-weight:900;color:var(--navy);line-height:1;}
.stat .cap{font-size:10px;color:var(--ink-soft);font-weight:700;margin-top:4px;}
.stat .num small{font-size:13px;}

.banner{background:linear-gradient(135deg,var(--accent),#f0c468);border-radius:18px;padding:14px 16px;color:var(--navy);display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.banner .em{font-size:26px;}
.banner b{font-size:15px;font-family:'Zen Maru Gothic';}
.banner div{font-size:11px;opacity:.8;}

.daily{background:#fff;border:1.5px dashed var(--accent);border-radius:16px;padding:14px;margin-bottom:14px;}
.daily-item{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;font-weight:700;}
.daily-item .chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;}
.daily-item.done .chk{background:var(--good);border-color:var(--good);}
.daily-item.done .chk svg{display:block;}
.daily-item .chk svg{display:none;width:11px;height:11px;}
.daily-item.done span{color:var(--ink-soft);text-decoration:line-through;}

.anniv-item{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--line);}
.anniv-item:last-child{border-bottom:none;}
.anniv-d{font-family:'Zen Maru Gothic';font-weight:900;font-size:18px;color:var(--accent);}
.anniv-d small{font-size:11px;color:var(--ink-soft);font-weight:600;}

.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.offline .sync-dot{background:#d76b6b;animation:none;}

.cfg-warn{background:#fff4e5;border:1px solid #f0c468;border-radius:14px;padding:12px 14px;font-size:12px;color:#8a5a00;margin:16px;line-height:1.6;}

/* ---------- ガチャ演出 ---------- */
.gacha-stage{width:200px;height:200px;margin:10px auto 6px;display:flex;align-items:center;justify-content:center;position:relative;border-radius:50%;transition:box-shadow .3s;}
.gacha-stage.flash{box-shadow:0 0 60px 10px rgba(127,168,212,.6);}
.gacha-stage.flash5{box-shadow:0 0 80px 20px rgba(232,176,75,.8);animation:rainbowGlow 1.2s ease;}
@keyframes rainbowGlow{0%{box-shadow:0 0 40px 10px rgba(232,176,75,.6)}50%{box-shadow:0 0 100px 30px rgba(232,136,155,.9)}100%{box-shadow:0 0 80px 20px rgba(127,168,212,.8)}}
.gacha-orb{font-size:80px;line-height:1;transition:transform .3s;}
.gacha-orb.shake{animation:shake .15s linear infinite;}
@keyframes shake{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(-4px,2px) rotate(-6deg)}75%{transform:translate(4px,-2px) rotate(6deg)}}
.gacha-orb.pop{animation:pop .5s cubic-bezier(.2,1.5,.4,1);}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(0)}}
.gacha-orb.reveal{animation:reveal .5s cubic-bezier(.2,1.4,.4,1);}
.gacha-orb.reveal.rare5{filter:drop-shadow(0 0 16px rgba(232,176,75,.8));}
@keyframes reveal{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.g-rarity{font-size:20px;font-weight:900;font-family:'Zen Maru Gothic';margin-top:6px;letter-spacing:.05em;}
.g-name{font-size:14px;font-weight:700;color:#fff;margin-top:2px;}
.evolve-art{width:150px;height:150px;margin:8px auto 0;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 20px rgba(232,176,75,.7));animation:reveal .6s cubic-bezier(.2,1.4,.4,1);}
</style>

/* ============ 育成キャラ定義（画像ベース） ============ */

// 進化に必要な累計EXP（前傾配分＝序盤サクサク）
const CURVE6=[0,15,40,80,165,330];      // 6段階（猫・犬）※約1.5倍
const CURVE5=[0,15,40,85,210];          // 5段階（熊・カワウソ・狐）※約1.5倍
function curveOf(type){ return EVO[type].stages.length===6?CURVE6:CURVE5; }

// 累計EXP→現在ステージ(0始まり)
function stageOf(type,exp){
  const c=curveOf(type); let s=0;
  for(let i=0;i<c.length;i++){ if(exp>=c[i]) s=i; }
  return s;
}
// 次ステージまでの進捗（0〜1）と残りEXP
function evoProgress(type,exp){
  const c=curveOf(type); const s=stageOf(type,exp);
  if(s>=c.length-1) return {ratio:1,remain:0,max:true,stage:s};
  const cur=c[s], next=c[s+1];
  return {ratio:(exp-cur)/(next-cur), remain:next-exp, max:false, stage:s};
}
function stageName(type,exp){ return EVO[type].stages[stageOf(type,exp)]; }

/* 画像パス（フォールバックでSVG文字列を返すこともある） */

  return `<img src="${type}_${stage}.png?v=${IMG_VER}" width="${size}" alt=""

    onerror="this.onerror=null;this.outerHTML=petSVG('${type}',${Math.min(stage-1,2)},${size})">`;
}
function missImgTag(id,size){

    style="width:${size}px;height:${size}px;object-fit:contain"
    onerror="this.onerror=null;this.style.opacity=.3;this.alt='?'">`;
}
const RARITY_COLOR={1:'#9aa3b2',2:'#5cb88a',3:'#5b8fd4',4:'#b07de0',5:'#e8b04b'};

    <circle cx="43.3" cy="44.7" r="1.2" fill="#fff"/><circle cx="59.3" cy="44.7" r="1.2" fill="#fff"/>

    <path d="M45 58 Q50 62 55 58" stroke="#2a2a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

}
/* ============ ユーティリティ ============ */
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ============ アイコンシステム（線アイコン・絵文字の置き換え） ============ */
/* 24x24 / stroke=currentColor。色とサイズはCSSで制御 */
function svgIco(paths,size=24,fill=false){
  return `<svg class="ico" viewBox="0 0 24 24" width="${size}" height="${size}" fill="${fill?'currentColor':'none'}" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
}
const ICON={
  // お世話
  food:  '<path d="M3 12h18a9 9 0 01-18 0z"/><path d="M3 12c1.5-1 3-1 4.5 0M9 11c1.5-1.5 4.5-1.5 6 0"/><path d="M5.5 16.5h13"/>',

  calendar:'<path d="M4 5h16v16H4zM4 9h16M8 3v4M16 3v4"/>',

function icon(name,size=18){ return svgIco(ICON[name]||'',size); }
function toast(msg,emoji='✨'){ const t=$('#toast'); t.innerHTML=`<span>${emoji}</span>${esc(msg)}`; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function today(){ const d=new Date(); return d.toISOString().slice(0,10); }
function daysUntil(dateStr){ if(!dateStr)return null; const d=new Date(dateStr+'T00:00:00'); const n=new Date(today()+'T00:00:00'); return Math.round((d-n)/86400000); }

/* 名前/プロフィール（state内） */
function names(){ return {a:DB.state.nameA||'ふたりめ A', b:DB.state.nameB||'ふたりめ B'}; }
function avatarOf(who){ return who==='a'?DB.state.avaA : DB.state.avaB; }
function avaHTML(who,cls='ava-mini'){ const img=avatarOf(who); const n=who==='a'?names().a:names().b; return img?`<img class="${cls}" src="${esc(img)}">`:`<span class="${cls}">${esc((n||'?').slice(0,1))}</span>`; }

/* ============ データ読み込み ============ */
async function loadAll(){
  if(ONLINE){
    try{
      const st = await sb.from('app_state').select('data').eq('id',1).single();
      DB.state = (st.data && st.data.data) || {};
      for(const t of TABLES){
        const r = await sb.from(t).select('*').order('created_at',{ascending:true});
        DB[t] = r.data || [];
      }
      lsSave();
    }catch(e){ console.warn('load fallback',e); DB = Object.assign(DB, lsLoad()); ONLINE=false; }
  }else{
    DB = Object.assign(DB, lsLoad());
  }
}

async function saveState(){
  lsSave();
  if(ONLINE){ try{ await sb.from('app_state').update({data:DB.state,updated_at:new Date().toISOString()}).eq('id',1); }catch(e){} }
}
async function addRow(table,obj){
  obj.created_at=new Date().toISOString();
  if(ONLINE){
    try{ const r=await sb.from(table).insert(obj).select().single(); DB[table].push(r.data); lsSave(); return r.data; }
    catch(e){ console.warn(e); }
  }
  obj.id='loc_'+Date.now()+Math.random().toString(36).slice(2,6); DB[table].push(obj); lsSave(); return obj;
}
async function updRow(table,id,patch){
  const row=DB[table].find(x=>String(x.id)===String(id)); if(row)Object.assign(row,patch); lsSave();
  if(ONLINE){ try{ await sb.from(table).update(patch).eq('id',id); }catch(e){} }
}
async function delRow(table,id){
  DB[table]=DB[table].filter(x=>String(x.id)!==String(id)); lsSave();
  if(ONLINE){ try{ await sb.from(table).delete().eq('id',id); }catch(e){} }
}

function subscribeRealtime(){
  if(!ONLINE) return;
  try{
    sb.channel('futari').on('postgres_changes',{event:'*',schema:'public'},async()=>{
      await loadAll(); render();
    }).subscribe();
  }catch(e){}
}

/* ============ 育成キャラ EXP ============ */
async function gainExp(amount,reason){
  if(!ME) return;
  const key = ME==='a'?'petA':'petB';
  const pet = DB.state[key]; if(!pet||!pet.type||EVO[pet.type]==null) return; // ハズレ確定キャラ等は育たない
  const before = stageOf(pet.type, pet.exp||0);
  pet.exp = (pet.exp||0)+amount;
  const after = stageOf(pet.type, pet.exp);
  await saveState();
  if(after>before){ showEvolve(pet, after); }
  else if(reason){ toast(`+${amount} EXP（${reason}）`,'⭐'); }
}
// 進化演出
function showEvolve(pet,stageIdx){

let careRunning=false;
function playCareAnim(pet, kind){
  careRunning=true;
  const c=CARE[kind];
  const stageIdx = stageOf(pet.type, pet.exp||0); // 0始まり
  const stage = stageIdx+1;                       // 画像は1始まり
  const heroImg = petImgTag(pet.type, stage, 200);

    <div class="care-msg">${esc(c.msg)}</div>
    <div class="care-exp">+${c.exp} EXP（${esc(c.label)}）</div>`;
  // 小物を放射状に飛ばす
  const N=10;
  for(let i=0;i<N;i++){
    const ang = (Math.PI*2/N)*i + (Math.random()*0.4-0.2);
    const dist = 110+Math.random()*70;
    const el=document.createElement('div');
    el.className='care-item';
    el.style.setProperty('--fx', `calc(-50% + ${Math.cos(ang)*dist}px)`);
    el.style.setProperty('--fy', `calc(-50% + ${Math.sin(ang)*dist - 30}px)`);
    el.style.setProperty('--fr', `${Math.random()*360-180}deg`);
    el.style.animationDelay = `${0.1 + Math.random()*0.5}s`;
    el.innerHTML = CARE_ITEM_SVG[kind];
    cs.appendChild(el);
  }
  requestAnimationFrame(()=>cs.classList.add('show'));
  // 約2.6秒で閉じてEXP加算
  setTimeout(async ()=>{
    cs.classList.remove('show');
    await gainExp(c.exp, c.label);   // 進化判定は既存gainExpが処理
    setTimeout(()=>{ cs.innerHTML=''; careRunning=false; render(); }, 280);
  }, 2600);
}

function stopGame(){ if(G&&G.raf) cancelAnimationFrame(G.raf); if(G&&G.spawn) clearInterval(G.spawn); G=null; }

function startGame(){
  const field=$('#gField');
  const start=$('#gStart'); if(start) start.remove();
  const pet=DB.state[ME==='a'?'petA':'petB'];
  const basketImg = (pet&&pet.type&&!pet.miss) ? petImgTag(pet.type, stageOf(pet.type,pet.exp||0)+1, 64)
                  : (pet&&pet.miss)? missImgTag(pet.miss,64) : petSVG('cat',1,64);
  const W=field.clientWidth, H=field.clientHeight;
  G={W,H,score:0,lives:3,items:[],bx:W/2-32,speed:1.6,t:0,last:performance.now()};
  // カゴ（キャラ）
  const basket=document.createElement('div'); basket.className='game-basket'; basket.id='gBasket';
  basket.innerHTML=basketImg; basket.style.left=G.bx+'px';
  field.appendChild(basket);
  renderLives();
  // 操作：タッチ/マウスでカゴを指に追従
  const move=(clientX)=>{ const r=field.getBoundingClientRect(); let x=clientX-r.left-32; x=Math.max(0,Math.min(G.W-64,x)); G.bx=x; basket.style.left=x+'px'; };
  field._move=(e)=>{ const x=e.touches?e.touches[0].clientX:e.clientX; move(x); };
  field.addEventListener('touchmove',field._move,{passive:true});
  field.addEventListener('touchstart',field._move,{passive:true});
  field.addEventListener('mousemove',field._move);
  // スポーン
  G.spawn=setInterval(spawnItem, 900);
  spawnItem();
  G.last=performance.now();
  loopGame();
}
const GAME_ITEMS=['fed','bath','play'];
function spawnItem(){
  if(!G) return;
  const field=$('#gField'); if(!field) return;
  const kind=GAME_ITEMS[Math.floor(Math.random()*GAME_ITEMS.length)];
  const el=document.createElement('div'); el.className='falling';
  el.innerHTML=CARE_ITEM_SVG[kind];
  const x=Math.random()*(G.W-34);
  el.style.left=x+'px'; el.style.top='-34px';
  field.appendChild(el);
  G.items.push({el,x,y:-34,vy:G.speed+Math.random()*0.8});
}
function renderLives(){
  const l=$('#gLives'); if(!l) return;
  l.innerHTML=Array.from({length:3}).map((_,i)=>`<span class="game-life" style="opacity:${i<G.lives?1:.2}">${icon('heart',14)}</span>`).join('');
}
function loopGame(){
  if(!G) return;
  const now=performance.now(), dt=Math.min(40,now-G.last); G.last=now;
  G.t+=dt; G.speed=1.6+G.t/12000; // 徐々に加速
  const basketTop=G.H-18-46, basketLeft=G.bx, basketRight=G.bx+64;
  for(let i=G.items.length-1;i>=0;i--){
    const it=G.items[i];
    it.y+=it.vy*(dt/16); it.el.style.top=it.y+'px';
    // キャッチ判定
    if(it.y+34>=basketTop && it.y+34<=basketTop+50){
      const cx=it.x+17;
      if(cx>=basketLeft && cx<=basketRight){
        G.score++; $('#gScore').textContent=G.score;
        it.el.remove(); G.items.splice(i,1); continue;
      }
    }
    // 落下（ミス）
    if(it.y>G.H){
      it.el.remove(); G.items.splice(i,1);
      G.lives--; renderLives();
      if(G.lives<=0){ endGame(); return; }
    }
  }
  G.raf=requestAnimationFrame(loopGame);
}
async function endGame(){
  const score=G?G.score:0;

let gachaResult=null;
// 排出テーブル：★5(進化5種)を引きやすめに。引き直し前提＆相棒は1匹なので、テンポ優先で約25%。
function rollGacha(){
  const r=Math.random()*100;
  if(r<25){ // ★5 進化キャラ：5種から均等
    const types=Object.keys(EVO);
    const t=types[Math.floor(Math.random()*types.length)];
    return {kind:'evo',type:t,rarity:5};
  }
  // ハズレ：レア度重みづけ（★1多め）
  const pool=[];
  MISS.forEach(m=>{ const w=m.r===1?5:m.r===2?3:m.r===3?2:1; for(let i=0;i<w;i++)pool.push(m); });
  const m=pool[Math.floor(Math.random()*pool.length)];
  return {kind:'miss',missId:m.id,rarity:m.r,name:m.name};
}

function startGacha(who){
  const g=$('#gateBody');

/* ---------- やることチェックリスト ---------- */
const CATS=['物件','契約','引越し','住所変更','手続き','その他'];
// カテゴリごとの色・アイコン
const CAT_STYLE={
  '物件':   {icon:'home',    color:'#7fa8d4', bg:'#e8f0fb'},
  '契約':   {icon:'doc',     color:'#b07de0', bg:'#f3e9fb'},
  '引越し': {icon:'truck',   color:'#e8a44b', bg:'#fdf1dd'},
  '住所変更':{icon:'mail', color:'#e8889b', bg:'#fce8ee'},
  '手続き': {icon:'folder',  color:'#5cb88a', bg:'#e9f3ec'},
  'その他': {icon:'pin',     color:'#9aa3b2', bg:'#eef0f4'}
};
function catStyle(c){ return CAT_STYLE[c]||CAT_STYLE['その他']; }

// 期限バッジ（残り日数を色分け）
function dueBadge(t){
  if(!t.due_date) return '';
  const d=daysUntil(t.due_date);
  if(t.done) return `<span class="due-badge done">${icon('calendar',11)} ${t.due_date}</span>`;
  if(d==null) return '';
  let cls,label;
  if(d<0){ cls='over';  label=`${-d}日すぎ`; }
  else if(d===0){ cls='today'; label='今日まで'; }
  else if(d<=3){ cls='soon';  label=`あと${d}日`; }
  else { cls='far'; label=`あと${d}日`; }
  return `<span class="due-badge ${cls}">${icon(cls==='over'?'warn':'calendar',11)} ${label}</span>`;
}

// 担当アイコン（顔写真）。bothは2人並べる
function assigneeIcon(a){
  if(a==='a') return `<span class="assignee-wrap">${avaHTML('a')}</span>`;
  if(a==='b') return `<span class="assignee-wrap">${avaHTML('b')}</span>`;
  if(a==='both') return `<span class="assignee-wrap">${avaHTML('a')}${avaHTML('b')}</span>`;
  return `<span class="assignee-none">担当未定</span>`;
}

// 期限順ソート：完了は下、未完は期限が近い順、期限なしはその後ろ
function sortByDue(arr){
  return arr.slice().sort((a,b)=>{
    if(!!a.done!==!!b.done) return a.done?1:-1;        // 未完を上
    const da=daysUntil(a.due_date), db=daysUntil(b.due_date);
    if(da==null&&db==null) return 0;
    if(da==null) return 1;                              // 期限なしは下
    if(db==null) return -1;
    return da-db;                                       // 近いやつが上
  });
}

function viewTasks(){
  const cats={};
  DB.tasks.forEach(t=>{ const c=t.category||'その他'; (cats[c]=cats[c]||[]).push(t); });
  const order=[...CATS,...Object.keys(cats).filter(c=>!CATS.includes(c))];
  let body='';
  order.forEach(c=>{
    if(!cats[c]) return;
    const st=catStyle(c);
    const list=sortByDue(cats[c]);
    const doneN=list.filter(t=>t.done).length;
    body+=`<div class="cat-head">
      <span class="cat-chip" style="background:${st.bg};color:${st.color}">${icon(st.icon,15)}</span>
      <span style="color:${st.color}">${esc(c)}</span>
      <span class="cat-count">${doneN}/${list.length}</span>
    </div>
    <div class="card taskcard" style="border-left-color:${st.color}">`;
    list.forEach(t=>{

        <button class="cbox ${t.done?'on':''}" onclick="toggleTask('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="M5 12l5 5 9-9"/></svg></button>

  return `<div class="section-title"><span class="dot"></span>やることリスト</div>${body}`;

/* ---------- 記念日 ---------- */
function daysSince(dateStr){ if(!dateStr)return null; const d=new Date(dateStr+'T00:00:00'); const n=new Date(today()+'T00:00:00'); return Math.round((n-d)/86400000); }
function viewAnniv(){
  const list=DB.anniversaries.map(a=>{
    if(a.mode==='countup'){ // 経過日数（付き合って○日目）
      const since=daysSince(a.date);
      return {...a,_mode:'up',_val:since};
    }
    // カウントダウン（次回まで）
    let next=a.date;
    if(a.recurring){
      const t=new Date(today()+'T00:00:00'); const src=new Date(a.date+'T00:00:00');
      let cand=new Date(t.getFullYear(),src.getMonth(),src.getDate());
      if(cand<t) cand=new Date(t.getFullYear()+1,src.getMonth(),src.getDate());
      next=cand.toISOString().slice(0,10);
    }
    return {...a,_mode:'down',_next:next,_d:daysUntil(next)};
  }).sort((x,y)=>{
    // カウントアップは上に、その後カウントダウンを近い順
    if(x._mode!==y._mode) return x._mode==='up'?-1:1;
    return x._mode==='up' ? (y._val-x._val) : (x._d-y._d);
  });
  let rows=list.map(a=>{
    const right = a._mode==='up'
      ? `<div class="anniv-d" style="color:var(--pink)">${a._val>=0?a._val:'—'}<small>日目</small></div>`
      : `<div class="anniv-d">${a._d===0?'今日!':'あと'+a._d}<small>${a._d===0?'':'日'}</small></div>`;
    const sub = a._mode==='up' ? `${a.date} から` : `${a.date}${a.recurring?' ・ 毎年':''}`;
    return `<div class="anniv-item">
      <div><div style="font-weight:800;font-size:14px;display:flex;align-items:center;gap:5px">${a._mode==='up'?`<span style="color:var(--pink);flex-shrink:0">${icon('heart',14)}</span>`:''}${esc(a.label)}</div><div class="mini" style="color:var(--ink-soft)">${sub}</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="text-align:right">${right}</div>
        <button class="del" onclick="delConfirm('anniversaries','${a.id}','${esc(a.label)}')">×</button>
      </div></div>`;
  }).join('');
  if(!list.length) rows=`<div class="empty">付き合った日・誕生日など<br>大切な日を登録しよう</div>`;
  // 先頭のカウントアップをヒーロー表示
  const hero=list.find(a=>a._mode==='up'&&a._val>=0);
  const heroCard = hero?`
    <div class="card" style="background:linear-gradient(135deg,#e8889b,#f0a8b8);color:#fff;text-align:center;padding:20px">
      <div style="font-size:12px;font-weight:700;opacity:.9;display:flex;align-items:center;justify-content:center;gap:5px">${icon('heart',15)} ${esc(hero.label)}</div>
      <div style="font-family:'Zen Maru Gothic';font-weight:900;font-size:44px;line-height:1.1;margin-top:4px">${hero._val}<span style="font-size:18px"> 日目</span></div>
      <div style="font-size:11px;opacity:.85;margin-top:2px">${hero.date} から</div>
    </div>`:'';
  return `<div class="section-title"><span class="dot"></span>記念日カウンター</div>${heroCard}<div class="card">${rows}</div>`;
}

/* FAB：タブごとの追加フォーム */
function onFab(){
  if(TAB==='tasks') openTaskAdd();
  else if(TAB==='budget') openBudgetAdd();
  else if(TAB==='wants') openWantAdd();
  else if(TAB==='wish') openWishAdd();
  else if(TAB==='rules') openRuleAdd();
  else if(TAB==='anniv') openAnnivAdd();
}

function openTaskAdd(){
  const n=names();
  openSheet(`<h3>やることを追加</h3>
    <div class="field-label">内容</div><input class="input" id="f_title" placeholder="例：引越し業者を予約" style="margin-bottom:14px">
    <div class="field-label">カテゴリ</div>
    <select class="input" id="f_cat" style="margin-bottom:14px">${CATS.map(c=>`<option>${c}</option>`).join('')}</select>
    <div class="field-label">担当</div>
    <div class="seg" id="f_assign" style="margin-bottom:14px">
      <button class="on" data-v="">未定</button>
      <button data-v="a">${esc(n.a)}</button>
      <button data-v="b">${esc(n.b)}</button>
      <button data-v="both">ふたり</button>
    </div>
    <div class="field-label">期限（任意）</div><input class="input" id="f_due" type="date" style="margin-bottom:18px">
    <button class="btn block" onclick="addTask()">追加する</button>`);
  segInit('f_assign');
}
function segInit(id){ const s=$('#'+id); s.querySelectorAll('button').forEach(b=>b.onclick=()=>{ s.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); s.dataset.v=b.dataset.v; }); }
async function addTask(){
  const title=$('#f_title').value.trim(); if(!title){toast('内容を入れてね','✍️');return;}
  await addRow('tasks',{title,category:$('#f_cat').value,assignee:$('#f_assign').dataset.v||null,due_date:$('#f_due').value||null,done:false,created_by:ME});
  closeSheet(); render(); toast('追加したよ');
}

function openBudgetAdd(){
  openSheet(`<h3>予算項目を追加</h3>
    <div class="field-label">項目名</div><input class="input" id="b_name" placeholder="例：敷金・礼金" style="margin-bottom:14px">
    <div class="grid2" style="margin-bottom:18px">
      <div><div class="field-label">予定額</div><input class="input" id="b_plan" type="number" inputmode="numeric" placeholder="0"></div>
      <div><div class="field-label">使った額</div><input class="input" id="b_act" type="number" inputmode="numeric" placeholder="0"></div>
    </div>
    <button class="btn block" onclick="addBudget()">追加する</button>`);
}
async function addBudget(){
  const name=$('#b_name').value.trim(); if(!name){toast('項目名を入れてね','✍️');return;}
  await addRow('budget_items',{name,planned:Number($('#b_plan').value||0),actual:Number($('#b_act').value||0)});
  closeSheet(); render(); toast('追加したよ');
}
function openBudgetEdit(id){
  const x=DB.budget_items.find(b=>b.id===id); if(!x)return;
  openSheet(`<h3>${esc(x.name)}</h3>
    <div class="grid2" style="margin-bottom:18px">
      <div><div class="field-label">予定額</div><input class="input" id="e_plan" type="number" inputmode="numeric" value="${x.planned||0}"></div>
      <div><div class="field-label">使った額</div><input class="input" id="e_act" type="number" inputmode="numeric" value="${x.actual||0}"></div>
    </div>
    <button class="btn block" onclick="saveBudget('${id}')">保存</button>
    <button class="btn ghost block" style="margin-top:10px" onclick="delConfirm('budget_items','${id}','${esc(x.name)}')">削除</button>`);
}
async function saveBudget(id){
  await updRow('budget_items',id,{planned:Number($('#e_plan').value||0),actual:Number($('#e_act').value||0)});
  closeSheet(); render(); toast('保存したよ');
}

function openWantAdd(){
  openSheet(`<h3>ほしい物を追加</h3>
    <div class="field-label">品名</div><input class="input" id="w_name" placeholder="例：冷蔵庫" style="margin-bottom:14px">
    <div class="field-label">URL（任意）</div><input class="input" id="w_url" placeholder="https://..." style="margin-bottom:14px">
    <div class="field-label">価格（任意）</div><input class="input" id="w_price" type="number" inputmode="numeric" placeholder="0" style="margin-bottom:18px">
    <button class="btn block" onclick="addWant()">追加する</button>`);
}
async function addWant(){
  const name=$('#w_name').value.trim(); if(!name){toast('品名を入れてね','✍️');return;}
  await addRow('wants',{name,url:$('#w_url').value.trim()||null,price:Number($('#w_price').value||0),agreed:false,bought:false,created_by:ME});
  closeSheet(); render(); toast('追加したよ');
}

function openWishAdd(){
  openSheet(`<h3>やりたいことを追加</h3>
    <div class="field-label">内容</div><input class="input" id="wi_title" placeholder="例：箱根に温泉旅行" style="margin-bottom:18px">
    <button class="btn block" onclick="addWish()">追加する</button>`);
}
async function addWish(){
  const title=$('#wi_title').value.trim(); if(!title){toast('内容を入れてね','✍️');return;}
  await addRow('wishes',{title,done:false,created_by:ME});
  await markDaily('wish');
  closeSheet(); render(); toast('追加したよ');
}

function openRuleAdd(){
  openSheet(`<h3>ルールを追加</h3>
    <div class="field-label">ルール</div><input class="input" id="r_text" placeholder="例：ゴミ出しは交代制" style="margin-bottom:18px">
    <button class="btn block" onclick="addRule()">追加する</button>`);
}
async function addRule(){
  const text=$('#r_text').value.trim(); if(!text){toast('内容を入れてね','✍️');return;}
  await addRow('rules',{text,created_by:ME});
  closeSheet(); render(); toast('追加したよ');
}

function openAnnivAdd(){
  openSheet(`<h3>記念日を追加</h3>
    <div class="field-label">タイプ</div>
    <div class="seg" id="a_mode" style="margin-bottom:14px">
      <button class="on" data-v="countup">経過日数（○日目）</button>
      <button data-v="countdown">次回まで（あと○日）</button>
    </div>
    <div class="field-label">ラベル</div><input class="input" id="a_label" placeholder="例：付き合った日" style="margin-bottom:14px">
    <div class="field-label">日付</div><input class="input" id="a_date" type="date" style="margin-bottom:14px">
    <label class="row" id="a_rec_wrap" style="margin-bottom:18px;gap:8px;display:none"><input type="checkbox" id="a_rec" checked style="width:20px;height:20px"> 毎年くり返す</label>
    <button class="btn block" onclick="addAnniv()">追加する</button>`);
  const seg=$('#a_mode');
  seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); seg.dataset.v=b.dataset.v;
    $('#a_rec_wrap').style.display = b.dataset.v==='countdown'?'flex':'none';
  });
  seg.dataset.v='countup';
}
async function addAnniv(){
  const label=$('#a_label').value.trim(), date=$('#a_date').value;
  const mode=$('#a_mode').dataset.v||'countup';
  if(!label||!date){toast('ラベルと日付を入れてね','✍️');return;}
  await addRow('anniversaries',{label,date,mode,recurring: mode==='countdown'?$('#a_rec').checked:false});
  closeSheet(); render(); toast('追加したよ');
}

/* 入居日 */
function openMoveIn(){
  openSheet(`<h3>入居日を設定</h3>
    <div class="field-label">引っ越し・入居の日</div>
    <input class="input" id="mi_date" type="date" value="${DB.state.moveInDate||''}" style="margin-bottom:18px">
    <button class="btn block" onclick="saveMoveIn()">設定する</button>
    ${DB.state.moveInDate?`<button class="btn ghost block" style="margin-top:10px" onclick="clearMoveIn()">クリア</button>`:''}`);
}
async function saveMoveIn(){ const d=$('#mi_date').value; if(!d){toast('日付を選んでね','📅');return;} DB.state.moveInDate=d; await saveState(); closeSheet(); render(); toast('設定したよ','🏠'); }
async function clearMoveIn(){ delete DB.state.moveInDate; await saveState(); closeSheet(); render(); }

/* プロフィール / 自分の切替 */
function openWhoami(){
  const n=names();
  const myName=ME==='a'?n.a:n.b;
  const pet=DB.state[ME==='a'?'petA':'petB'];
  openSheet(`<h3>プロフィール</h3>
    <div style="text-align:center;margin-bottom:16px">
      <div style="position:relative;display:inline-block">
        ${avaHTML(ME,'ava-big')}
      </div>
      <div style="font-weight:800;margin-top:8px">${esc(myName)}</div>
      ${pet&&pet.confirmed?`<div style="font-size:12px;color:var(--ink-soft)">あいぼう：${esc(pet.nick|| (pet.miss?(pet.name||'あいぼう'):EVO[pet.type].label))}${pet.miss?` ${stars(pet.rarity||1)}`:`（${esc(stageName(pet.type,pet.exp||0))}）`}</div>`:''}
    </div>
    <div class="field-label">プロフィール画像</div>
    <input type="file" accept="image/*" id="ava_file" style="margin-bottom:8px;font-size:13px">
    <div style="font-size:11px;color:var(--ink-soft);margin-bottom:16px">タスク完了などに、この画像が表示されるよ</div>
    <div class="field-label">表示名を変更</div>
    <input class="input" id="ava_name" value="${esc(myName)}" style="margin-bottom:18px">
    <button class="btn block" onclick="saveProfile()">保存</button>
    <button class="btn ghost block" style="margin-top:10px" onclick="switchUser()">別の人に切り替え</button>`);
  $('#ava_file').onchange=onAvaFile;
}
let _pendingAva=null;
function onAvaFile(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    // 縮小してbase64保存（容量節約）
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas'); const S=200;
      const scale=Math.min(S/img.width,S/img.height); cv.width=img.width*scale; cv.height=img.height*scale;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      _pendingAva=cv.toDataURL('image/jpeg',0.8);
      toast('画像を読み込んだよ。保存を押してね','🖼️');
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
}
async function saveProfile(){
  const name=$('#ava_name').value.trim();
  if(name){ if(ME==='a')DB.state.nameA=name; else DB.state.nameB=name; }
  if(_pendingAva){ if(ME==='a')DB.state.avaA=_pendingAva; else DB.state.avaB=_pendingAva; _pendingAva=null; }
  await saveState(); closeSheet(); render(); toast('保存したよ');
}
function switchUser(){ ME=null; closeSheet(); showGate(); renderGate(); }

/* 削除確認 */
function delConfirm(table,id,label){
  openSheet(`<h3>削除しますか？</h3>
    <p style="color:var(--ink-soft);font-size:13px;margin:-8px 0 18px">「${esc(label)}」を削除します。元に戻せません。</p>
    <button class="btn block" style="background:#d76b6b" onclick="doDel('${table}','${id}')">削除する</button>
    <button class="btn ghost block" style="margin-top:10px" onclick="closeSheet()">やめる</button>`);
}
async function doDel(table,id){ await delRow(table,id); closeSheet(); render(); toast('削除したよ','🗑️'); }
</script>
